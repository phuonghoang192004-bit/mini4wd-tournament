<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
// ============================================================
// SUPABASE
// ============================================================

const SUPABASE_URL =
"https://owpulzfxucatvidykmor.supabase.co";

const SUPABASE_ANON_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93cHVsemZ4dWNhdHZpZHlrbW9yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NTUxNzUsImV4cCI6MjA5ODMzMTE3NX0.EkcX4d9IlcUp0cHb4J2bWtYjisFs3CxF1rnXZITPSdc";

const supabase = window.supabase.createClient(

async function testSupabase() {

        .from("rooms")

        .limit(1);

    if (error) {

        console.error(error);

    } else {

    }

}
// ============================================================
// STORAGE KEY
// ============================================================
const STORAGE_KEY = 'm4wd_session_v3';

function saveSession(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}
function loadSession() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}
function clearSession() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

// Global room store (shared across tabs via localStorage)
const ROOM_KEY = 'm4wd_room_v3';
function saveRoom(room) {
  try { localStorage.setItem(ROOM_KEY, JSON.stringify(room)); } catch(e) {}
}
function loadRoom() {
  try {
    const raw = localStorage.getItem(ROOM_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

// ============================================================
// UTILITIES
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function getBracketTarget(count) {
  if (count <= 8) return 8;
  if (count <= 16) return 16;
  if (count <= 32) return 32;
  return 64;
}
function needsQualifier(count) {
  return count !== 8 && count !== 16 && count !== 32;
}

// ============================================================
// TOAST SYSTEM
// ============================================================
function ToastContainer({ toasts }) {
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>
      ))}
    </div>
  );
}

// ============================================================
// JACKPOT REEL
// ============================================================
function JackpotReel({ onResult, disabled, existingNumbers, label }) {
  const [spinning, setSpinning] = useState(false);
  const [result, setResult] = useState(null);
  const [digits, setDigits] = useState(['?','?']);
  const intervalRef = useRef(null);
  const timeoutRef = useRef(null);

  const spin = () => {
    if (spinning || disabled || result !== null) return;
    setSpinning(true);
    setDigits(['?','?']);
    let ticks = 0;
    intervalRef.current = setInterval(() => {
      setDigits([Math.floor(Math.random()*10), Math.floor(Math.random()*10)]);
      ticks++;
    }, 80);
    timeoutRef.current = setTimeout(() => {
      clearInterval(intervalRef.current);
      let num; let attempts = 0;
      do {
        num = Math.floor(Math.random()*100).toString().padStart(2,'0');
        attempts++;
      } while (existingNumbers.includes(num) && attempts < 200);
      setDigits(num.split(''));
      setResult(num);
      setSpinning(false);
      onResult(num);
    }, 2000 + Math.random()*500);
  };

  useEffect(() => () => { clearInterval(intervalRef.current); clearTimeout(timeoutRef.current); }, []);

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
      {label && <div className="text-xs text-dim mono" style={{letterSpacing:2}}>{label}</div>}
      <div style={{display:'flex',gap:6}}>

// ============================================================
// DICE ROLLER — unique lane per match
// ============================================================
function DiceRoller({ allowedValues, onResult, disabled, locked, lockedValue }) {
  const [rolling, setRolling] = useState(false);
  const [displayVal, setDisplayVal] = useState('?');

  // Kiểm tra quyền: Chỉ Admin HOẶC chủ xe mới được đổ
  const canP1Dice = isAdmin || (playerName === p1?.ownerName);
  const canP2Dice = isAdmin || (playerName === p2?.ownerName);
  const roll = () => {
    if (rolling || disabled || locked) return;
    setRolling(true);
    let ticks = 0;
    const iv = setInterval(() => {
      setDisplayVal(allowedValues[Math.floor(Math.random()*allowedValues.length)]);
      ticks++;
      if (ticks > 15) {
        clearInterval(iv);
        // Pick random from allowedValues (caller ensures uniqueness via allowedValues filtering)
        const finalVal = allowedValues[Math.floor(Math.random()*allowedValues.length)];
        setDisplayVal(finalVal);
        setRolling(false);
        onResult(finalVal);
      }
    }, 60);
  };

  const val = locked ? lockedValue : displayVal;
  const laneClass = val === 1 ? 'lane-1' : val === 2 ? 'lane-2' : val === 3 ? 'lane-3' : '';

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
      <div
        className={`dice-face${rolling?' rolling':''}${locked?' locked':''}${disabled&&!locked?' disabled':''}`}
        onClick={roll}
        title={locked?'Đã khóa':disabled?'Không có quyền':'Nhấn để xóc xúc xắc'}
      >
        {val==='?' ? '?' : val}
      </div>
      {locked ? (
        <span className={`lane-badge ${laneClass}`}>LANE {val}</span>
      ) : (
        <span className="text-xs text-dim" style={{fontFamily:'Share Tech Mono'}}>
          {rolling ? 'đang xóc...' : disabled ? '🔒' : allowedValues.length===0 ? 'Hết lane!' : 'nhấn xóc'}
        </span>
      )}
    </div>
  );
}

// PHASE INDICATOR

function PhaseIndicator({ phase }) {
  const phases = [
    {id:'jackpot',label:'QUAY SỐ'},
    {id:'qualifier',label:'VÒNG LOẠI'},
    {id:'bracketSeed',label:'XẾP BẢNG'},
    {id:'bracket',label:'BẢNG ĐẤU'},
    {id:'complete',label:'KẾT THÚC'},
  ];
  const currentIdx = phases.findIndex(p => p.id === phase);
  return (
    <div className="phase-steps">
      {phases.map((p,i) => {
        const isDone = i < currentIdx;
        const isActive = i === currentIdx;
        return (
          <div key={p.id} className={`phase-step ${isDone?'done':''} ${isActive?'active':''}`}>
            <div className="phase-dot">{isDone?'✓':i+1}</div>
            <div className="phase-label">{p.label}</div>
          </div>
        );
      })}
    </div>
  );
}

// ============================================================
// BRACKET MATCH BOX
// ============================================================
function BracketMatchBox({ match, isAdmin, currentPlayerId }) {
  if (!match) return null;
  const p1 = match.p1, p2 = match.p2;
  const isActive = match.status === 'active';
  const isComplete = match.status === 'complete';
  const isBye = match.isBye;
  const canInteract = isAdmin || (currentPlayerId && (p1?.id===currentPlayerId || p2?.id===currentPlayerId));

  const renderPlayer = (player, lane, score, isWinner, isLoser) => {
    if (!player) return <div className="match-player" style={{color:'var(--text-dim)',fontStyle:'italic',fontSize:'.8rem'}}>Chờ...</div>;
    if (player==='BYE') return <div className="match-player bye">🏆 BYE (tự thắng)</div>;
    return (
      <div className={`match-player ${isWinner?'winner':''} ${isLoser?'loser':''}`}>
        <span className="match-number-badge">{player.jackpotNumber||'??'}</span>
        <span style={{flex:1,fontSize:'.82rem',fontWeight:600}}>{player.name}</span>
        {lane && <span className={`lane-badge lane-${lane}`} style={{fontSize:'.65rem',padding:'1px 5px'}}>L{lane}</span>}
        {score!==null&&score!==undefined && <span className="match-score" style={{color:isWinner?'var(--gold)':'var(--text-dim)'}}>{score}</span>}
        {isWinner && <span>🏆</span>}
      </div>
    );
  };

  return (
    <div className={`match-box ${isActive?'active':''} ${isComplete?'completed':''}`} style={{minWidth:170,maxWidth:200}}>
      {isBye&&p1 ? (
        <>{renderPlayer(p1,match.p1Lane,match.p1Score,true,false)}{renderPlayer('BYE',null,null,false,false)}</>
      ) : (
        <>
          {renderPlayer(p1,match.p1Lane,match.p1Score,match.winnerId===p1?.id,match.loserId===p1?.id)}
          <div style={{height:1,background:'var(--border)'}}/>
          {renderPlayer(p2,match.p2Lane,match.p2Score,match.winnerId===p2?.id,match.loserId===p2?.id)}
        </>
      )}
      {isActive&&canInteract && (
        <div style={{padding:'6px 8px',background:'var(--bg4)',borderTop:'1px solid rgba(245,197,24,.19)',display:'flex',justifyContent:'center'}}>
          <span style={{fontSize:'.65rem',color:'var(--gold)',fontFamily:'Share Tech Mono'}}>▶ ĐANG ĐẤU</span>
        </div>
      )}
    </div>
  );
}

// QUALIFIER DICE MODAL — unique lane per group

function QualifierDiceModal({ group, roundIdx, groupIdx, currentPlayerId, isAdmin, onDiceResult, onClose }) {
  // Build local lane state
  const [lanes, setLanes] = useState({...group.lanes});

  const usedLanes = Object.values(lanes);
  const maxLanes = group.players.length; // 2 or 3

  const handleRoll = (playerId, val) => {
    setLanes(prev => ({...prev, [playerId]: val}));
    onDiceResult(roundIdx, groupIdx, playerId, val);
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.85)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:20}}>
      <div style={{background:'var(--bg2)',border:'1px solid var(--cyan)',borderRadius:16,padding:24,maxWidth:440,width:'100%',boxShadow:'0 0 40px rgba(0,212,255,.19)'}}>

          <div className="section-header" style={{marginBottom:0,color:'var(--cyan)'}}>🎲 XÓC XÚC XẮC LANE</div>
          <button className="btn btn-outline btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="text-xs text-dim mono mb-3" style={{letterSpacing:2}}>Mỗi xe 1 lane riêng — không trùng</div>
        {group.players.map(p => {
          const myLane = lanes[p.id];
          const locked = myLane !== undefined;
          const canRoll = isAdmin || currentPlayerId === p.id;
          const available = [1,2,3].slice(0, maxLanes).filter(v => !usedLanes.includes(v) || v === myLane);
          return (
            <div key={p.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
              <span className="badge badge-gold" style={{minWidth:40}}>{p.jackpotNumber}</span>
              <span style={{fontWeight:600,flex:1,minWidth:80}}>{p.name}</span>
              <DiceRoller
                allowedValues={locked ? [myLane] : available}
                onResult={v => handleRoll(p.id, v)}
                disabled={!canRoll || locked || group.complete}
                locked={locked}
                lockedValue={myLane}
              />
            </div>
          );
        })}
        <div style={{marginTop:16,textAlign:'center'}}>
          <button className="btn btn-outline btn-sm" onClick={onClose}>Đóng</button>
        </div>
      </div>
    </div>
  );
}

      cars.filter(c=>c.status==='approved').forEach(c => {
        result.push({ id:c.id, name:c.name, ownerName:owner, jackpotNumber:null, qualifierScore:0, status:'active' });
      });
    });
    return result;
  };

  // ---- Tournament creation (admin) ----
  const createTournament = () => {
    const cars = allApprovedCars();
    if (cars.length < 4) { toast('⚠️ Cần ít nhất 4 xe được duyệt!','error'); return; }
    const count = cars.length;
    const target = getBracketTarget(count);
    const hasQualifier = needsQualifier(count);
    const t = {
      name: roomName,
      phase: 'jackpot',
      players: cars,
      qualifierRounds: hasQualifier ? qualifierRounds : 0,
      qualifierData: [],
      currentQualifierRound: 0,
      bracketTarget: target,
      hasQualifier,
      winnersRounds: [], losersRounds: [],
      grandFinal: null, grandFinalReset: null,
      matchHistory: {}, champion: null,
    };
    setTournament(t);
    setShowNewTournament(false);
    setActiveTab('players');
    saveRoom({ roomName, tournament: t, guestCars });
    toast(`🏆 Giải đấu bắt đầu với ${count} xe!`,'success');
  };

  const setTournamentAndSave = (fn) => {
    setTournament(prev => {
      const next = typeof fn === 'function' ? fn(prev) : fn;
      saveRoom({ roomName, tournament: next, guestCars });
      return next;
    });
  };

  // ---- Jackpot ----
  const assignJackpotNumber = (playerId, number) => {
    setTournamentAndSave(prev => ({
      ...prev,
      players: prev.players.map(p => p.id===playerId ? {...p, jackpotNumber:number} : p)
    }));
    toast(`🎰 Số ${number} đã được gán!`,'success');
  };

  const allJackpotsAssigned = tournament?.players.every(p => p.jackpotNumber!==null);

  const proceedFromJackpot = () => {
    if (!allJackpotsAssigned) { toast('⚠️ Tất cả xe phải quay số!','error'); return; }
    if (tournament.hasQualifier) {
      initQualifierRound(tournament, 1);
      setTournamentAndSave(prev => ({...prev, phase:'qualifier'}));
    } else {
      setTournamentAndSave(prev => ({...prev, phase:'bracketSeed'}));
    }
    toast('✅ Chuyển sang giai đoạn tiếp!','success');
  };

  // ---- Qualifier ----
  const initQualifierRound = (t, roundNum) => {
    const activePlayers = t.players.filter(p => p.status==='active');
    const shuffled = shuffle(activePlayers);
    const groups = [];
    let i = 0;
    // Ensure every group has at least 2 players
    while (i < shuffled.length) {
      const remaining = shuffled.length - i;
      if (remaining === 0) break;
      if (remaining === 1) {
        // Merge lone player into last group (3-player group)
        if (groups.length > 0) {
          groups[groups.length-1] = [...groups[groups.length-1], shuffled[i]];
        } else {
          // Only 1 player total — shouldn't happen if cars >= 4
          groups.push([shuffled[i]]);
        }
        i++;
      } else if (remaining === 2) {
        groups.push([shuffled[i], shuffled[i+1]]);
        i += 2;
      } else if (remaining === 4) {
        // Split into two 2-player groups (not 3+1)
        groups.push([shuffled[i], shuffled[i+1]]);
        groups.push([shuffled[i+2], shuffled[i+3]]);
        i += 4;
      } else {
        groups.push([shuffled[i], shuffled[i+1], shuffled[i+2]]);
        i += 3;
      }
    }

    const roundData = {
      round: roundNum,
      groups: groups.map(g => ({ players:g, lanes:{}, scores:{}, complete:false }))
    };
    setTournamentAndSave(prev => ({
      ...prev,
      qualifierData: [...(prev.qualifierData||[]), roundData],
      currentQualifierRound: roundNum,
      phase: 'qualifier',
    }));
  };

  const handleQualifierDice = (roundIdx, groupIdx, playerId, value) => {
    setTournamentAndSave(prev => {
      const newData = prev.qualifierData.map((rd,ri) => {
        if (ri!==roundIdx) return rd;
        return {
          ...rd,
          groups: rd.groups.map((g,gi) => {
            if (gi!==groupIdx) return g;
            // Unique lane: remove any other player who had this lane
            const newLanes = {...g.lanes};
            Object.keys(newLanes).forEach(pid => { if (newLanes[pid]===value && pid!==playerId) delete newLanes[pid]; });
            newLanes[playerId] = value;
            return {...g, lanes:newLanes};
          })
        };
      });
      return {...prev, qualifierData:newData};
    });
  };

  const handleQualifierScore = (roundIdx, groupIdx, playerId, score) => {
    setTournamentAndSave(prev => {
      const newData = prev.qualifierData.map((rd,ri) => {
        if (ri!==roundIdx) return rd;
        return {
          ...rd,
          groups: rd.groups.map((g,gi) => {
            if (gi!==groupIdx) return g;
            return {...g, scores:{...g.scores, [playerId]:score}};
          })
        };
      });
      return {...prev, qualifierData:newData};
    });
  };

  const completeQualifierGroup = (roundIdx, groupIdx) => {
    setTournamentAndSave(prev => {
      const group = prev.qualifierData[roundIdx].groups[groupIdx];
      for (const p of group.players) {
        if (group.lanes[p.id]===undefined) { toast('⚠️ Chưa xóc xúc xắc!','error'); return prev; }
        if (group.scores[p.id]===undefined) { toast('⚠️ Chưa nhập điểm!','error'); return prev; }
      }
      // Check unique lanes
      const laneVals = group.players.map(p => group.lanes[p.id]);
      if (new Set(laneVals).size !== laneVals.length) { toast('⚠️ Có xe trùng lane!','error'); return prev; }

      let updatedPlayers = prev.players.map(p => {
        const s = group.scores[p.id];
        if (s!==undefined) return {...p, qualifierScore:(p.qualifierScore||0)+s};
        return p;
      });
      const newData = prev.qualifierData.map((rd,ri) => {
        if (ri!==roundIdx) return rd;
        return {...rd, groups:rd.groups.map((g,gi) => gi!==groupIdx ? g : {...g,complete:true})};
      });
      return {...prev, qualifierData:newData, players:updatedPlayers};
    });
    toast('✅ Ván đấu hoàn thành!','success');
  };

  const isQualifierRoundComplete = (roundIdx) => {
    if (!tournament?.qualifierData[roundIdx]) return false;
    return tournament.qualifierData[roundIdx].groups.every(g => g.complete);
  };

  const advanceQualifierRound = () => {
    const nextRound = tournament.currentQualifierRound + 1;
    if (nextRound <= tournament.qualifierRounds) {
      initQualifierRound(tournament, nextRound);
      toast(`✅ Bắt đầu vòng loại ${nextRound}!`,'success');
    } else {
      finalizeQualifiers();
    }
  };

  const finalizeQualifiers = () => {
    const target = tournament.bracketTarget; // 8, 16 hoặc 32
    // Sắp xếp người chơi theo điểm vòng loại giảm dần
    const sorted = [...tournament.players].sort((a, b) => (b.qualifierScore || 0) - (a.qualifierScore || 0));
    
    // Những người xếp hạng cao (trong target) thì Active, còn lại là Out
    const updatedPlayers = sorted.map((p, index) => ({
        ...p,
        status: index < target ? 'active' : 'out'
    }));

    const updatedT = { ...tournament, players: updatedPlayers, phase: 'bracketSeed' };
    setTournament(updatedT);
    syncToCloud(updatedT, guestCars);
    toast(`🏆 Đã chọn Top ${target} vào bảng đấu. ${updatedPlayers.filter(p=>p.status==='out').length} xe đã bị loại!`, 'success');
  };

  // ---- Bracket seeding ----
  useEffect(() => {
    if (tournament?.phase==='bracketSeed') {
      const qualified = tournament.players.filter(p => p.status==='active');
      setSeedingPlayers(shuffle(qualified));
      setSeedingPairs([]);
    }
  }, [tournament?.phase]);

  const spinNextPair = () => {
    if (seedingPlayers.length < 2 || spinningPair) return;
    setSpinningPair(true);
    setTimeout(() => {
      const remaining = [...seedingPlayers];
      const idx1 = Math.floor(Math.random()*remaining.length);
      const p1 = remaining.splice(idx1,1)[0];
      const idx2 = Math.floor(Math.random()*remaining.length);
      const p2 = remaining.splice(idx2,1)[0];
      setSeedingPairs(prev => [...prev,[p1,p2]]);
      setSeedingPlayers(remaining);
      setSpinningPair(false);
      toast(`🎰 Cặp đấu: ${p1.name} vs ${p2.name}`,'success');
    }, 1500);
  };

  const confirmBracketSeed = () => {
    const qualified = tournament.players.filter(p => p.status === 'active');
    const shuffled = shuffle(qualified); // Trộn ngẫu nhiên cặp đấu đầu tiên
    
    const makeMatch = (id, r, br, pos) => ({
        matchId: id, p1: null, p2: null, status: 'pending',
        p1Lane: null, p2Lane: null, p1Score: null, p2Score: null,
        winnerId: null, loserId: null, round: r, bracket: br, position: pos, isBye: false
    });

    // NHÁNH THẮNG (WINNER BRACKET)
    const wbR1 = Array.from({ length: shuffled.length / 2 }, (_, i) => {
        const m = makeMatch(`WB_R1_M${i}`, 1, 'WB', i);
        m.p1 = shuffled[i * 2]; m.p2 = shuffled[i * 2 + 1]; m.status = 'active';
        return m;
    });

    // Tạo các Round tiếp theo của Nhánh thắng
    const wbR2 = Array.from({ length: wbR1.length / 2 }, (_, i) => makeMatch(`WB_R2_M${i}`, 2, 'WB', i));
    const wbR3 = Array.from({ length: wbR2.length / 2 }, (_, i) => makeMatch(`WB_R3_M${i}`, 3, 'WB', i));
    const wbFinal = [makeMatch(`WB_FINAL`, 4, 'WB', 0)]; // Chung kết nhánh thắng

    // NHÁNH THUA (LOSER BRACKET) - Các vòng 0-1, 1-1, 2-1...
    const lbR1 = Array.from({ length: wbR1.length / 2 }, (_, i) => makeMatch(`LB_R1`, 1, 'LB', i)); // Round 0-1
    const lbR2 = Array.from({ length: wbR1.length / 2 }, (_, i) => makeMatch(`LB_R2`, 2, 'LB', i)); // Round 1-1
    // ... thêm các round nhánh thua dựa trên số người (logic này tự động giãn theo target)

    const qualifyingMatch = makeMatch(`QUALIFYING`, 10, 'QM', 0); // Trận xác định suất
    const grandFinal = makeMatch(`GRAND_FINAL`, 11, 'GF', 0); // Chung kết tổng

    const updatedT = {
        ...tournament,
        phase: 'bracket',
        winnersRounds: [wbR1, wbR2, wbR3, wbFinal],
        losersRounds: [lbR1, lbR2], // Bạn có thể thêm các vòng nhánh thua tại đây
        qualifyingMatch,
        grandFinal,
        matchHistory: {}
    };
    setTournament(updatedT);
    syncToCloud(updatedT, guestCars);
    setActiveTab('bracket');
};

  // ---- Match complete ----
  const handleMatchComplete = (updatedMatch) => {
    setTournamentAndSave(prev => {
      let newWR = prev.winnersRounds.map(r=>r.map(m=>m.matchId===updatedMatch.matchId?updatedMatch:m));
      let newLR = prev.losersRounds.map(r=>r.map(m=>m.matchId===updatedMatch.matchId?updatedMatch:m));
      let newGF = prev.grandFinal?.matchId===updatedMatch.matchId?updatedMatch:prev.grandFinal;
      let newGFR = prev.grandFinalReset?.matchId===updatedMatch.matchId?updatedMatch:prev.grandFinalReset;

      const winner = prev.players.find(p=>p.id===updatedMatch.winnerId);
      const loser = prev.players.find(p=>p.id===updatedMatch.loserId);
      let newHistory = {...prev.matchHistory};
      if (winner&&loser) {
        newHistory[winner.id] = [...(newHistory[winner.id]||[]),loser.id];
        newHistory[loser.id] = [...(newHistory[loser.id]||[]),winner.id];
      }

      const wRoundIdx = newWR.findIndex(r=>r.some(m=>m.matchId===updatedMatch.matchId));
      if (wRoundIdx!==-1) {
        const matchIdx = newWR[wRoundIdx].findIndex(m=>m.matchId===updatedMatch.matchId);
        const nextRoundIdx = wRoundIdx+1;
        if (nextRoundIdx<newWR.length&&winner) {
          const nextMatchIdx = Math.floor(matchIdx/2);
          const slot = matchIdx%2===0?'p1':'p2';
          newWR = newWR.map((r,ri)=>ri!==nextRoundIdx?r:r.map((m,mi)=>{
            if (mi!==nextMatchIdx) return m;
            const updated = {...m,[slot]:winner};
            if (updated.p1&&updated.p2) updated.status='active';
            return updated;
          }));
        } else if (nextRoundIdx>=newWR.length&&winner) {
          newGF = {...newGF, p1:winner};
          if (newGF.p1&&newGF.p2) newGF.status='active';
        }
        if (loser&&newLR.length>0) {
          const lbTargetRound = wRoundIdx*2;
          const lbRoundIdx = Math.min(lbTargetRound,newLR.length-1);
          let placed = false;
          newLR = newLR.map((r,ri)=>{
            if (ri!==lbRoundIdx||placed) return r;
            return r.map(m=>{
              if (placed) return m;
              if (!m.p1||!m.p2) { placed=true; const slot=!m.p1?'p1':'p2'; const updated={...m,[slot]:loser}; if (updated.p1&&updated.p2) updated.status='active'; return updated; }
              return m;
            });
          });
        }
      }

      const lRoundIdx = newLR.findIndex(r=>r.some(m=>m.matchId===updatedMatch.matchId));
      if (lRoundIdx!==-1) {
        const matchIdx = newLR[lRoundIdx].findIndex(m=>m.matchId===updatedMatch.matchId);
        const nextLBRound = lRoundIdx+1;
        if (nextLBRound<newLR.length&&winner) {
          const nextMatchIdx = Math.floor(matchIdx/2);
          const slot = matchIdx%2===0?'p1':'p2';
          newLR = newLR.map((r,ri)=>ri!==nextLBRound?r:r.map((m,mi)=>{
            if (mi!==nextMatchIdx) return m;
            const updated = {...m,[slot]:winner};
            if (updated.p1&&updated.p2) updated.status='active';
            return updated;
          }));
        } else if (nextLBRound>=newLR.length&&winner) {
          newGF = {...newGF, p2:winner};
          if (newGF.p1&&newGF.p2) newGF.status='active';
        }
      }

      const isGF = prev.grandFinal?.matchId===updatedMatch.matchId;
      const isGFR = prev.grandFinalReset?.matchId===updatedMatch.matchId;
      if (isGF&&winner&&loser) {
        const wbChampion = newGF?.p1;
        if (winner.id===wbChampion?.id) {
          return {...prev,winnersRounds:newWR,losersRounds:newLR,grandFinal:newGF,grandFinalReset:newGFR,matchHistory:newHistory,champion:winner,phase:'complete'};
        } else {
          const resetMatch = {matchId:'GF_RESET',p1:wbChampion,p2:winner,p1Lane:null,p2Lane:null,p1Score:null,p2Score:null,winnerId:null,loserId:null,status:'active',round:2,bracket:'GF',position:0,isBye:false};
          return {...prev,winnersRounds:newWR,losersRounds:newLR,grandFinal:updatedMatch,grandFinalReset:resetMatch,matchHistory:newHistory};
        }
      }
      if (isGFR&&winner) {
        return {...prev,winnersRounds:newWR,losersRounds:newLR,grandFinal:newGF,grandFinalReset:updatedMatch,matchHistory:newHistory,champion:winner,phase:'complete'};
      }

      let updatedPlayers = prev.players.map(p => {
        if (p.id===updatedMatch.loserId&&lRoundIdx!==-1) return {...p,status:'out'};
        return p;
      });
      return {...prev,winnersRounds:newWR,losersRounds:newLR,grandFinal:newGF,grandFinalReset:newGFR,matchHistory:newHistory,players:updatedPlayers};
    });
  };

  const isAdmin = role==='admin';
  const existingNumbers = tournament?.players.filter(p=>p.jackpotNumber).map(p=>p.jackpotNumber)||[];
  // Find cars owned by current guest
  const myCarIds = role==='guest' ? (guestCars[playerName]||[]).filter(c=>c.status==='approved').map(c=>c.id) : [];
  const currentPlayerForCar = (carId) => tournament?.players.find(p=>p.id===carId);

  // ============================================================
  // RENDER: LOGIN
  // ============================================================
  if (!role) {
    return (
      <>
        <div className="login-screen">
          <div className="login-logo">🏎️ MINI 4WD<br/>TOURNAMENT</div>
          <div className="login-subtitle">TAMIYA RACING MANAGEMENT SYSTEM</div>
          <div className="login-card">
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}}>
              {/* Guest */}
              <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:12,padding:20,transition:'all .2s'}}
                onMouseEnter={e=>e.currentTarget.style.borderColor='var(--cyan)'}
                onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
                <div style={{textAlign:'center',marginBottom:12}}>
                  <span style={{fontSize:'2.5rem'}}>👤</span>
                  <div className="orbitron" style={{fontSize:'1rem',fontWeight:700,color:'var(--cyan)',marginTop:8}}>GUEST</div>
                  <div className="text-dim text-xs" style={{marginTop:4}}>Đăng ký xe & xóc xúc xắc</div>
                </div>
                <input className="input" placeholder="Tên của bạn..." value={playerName}
                  onChange={e=>setPlayerName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&loginGuest()}
                  style={{marginBottom:10,fontSize:'.9rem'}} />
                <button className="btn btn-cyan w-full" onClick={loginGuest}>VÀO XEM</button>
              </div>
              {/* Admin */}
              <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:12,padding:20,transition:'all .2s'}}
                onMouseEnter={e=>e.currentTarget.style.borderColor='var(--gold)'}
                onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
                <div style={{textAlign:'center',marginBottom:12}}>
                  <span style={{fontSize:'2.5rem'}}>👑</span>
                  <div className="orbitron" style={{fontSize:'1rem',fontWeight:700,color:'var(--gold)',marginTop:8}}>ADMIN</div>
                  <div className="text-dim text-xs" style={{marginTop:4}}>Toàn quyền điều hành</div>
                </div>
                <div style={{animation:passError?'shake .4s ease':'none'}}>
                  <input className="input" type="password" placeholder="Mật khẩu..." value={adminPass}
                    onChange={e=>setAdminPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&loginAdmin()}
                    style={{marginBottom:10,fontSize:'.9rem',borderColor:passError?'var(--red)':undefined}} />
                </div>
                <button className="btn btn-gold w-full" onClick={loginAdmin}>ĐĂNG NHẬP</button>
              </div>
            </div>
            <div className="text-center text-dim text-xs" style={{fontFamily:'Share Tech Mono'}}>v3.0 · SGMS MINI 4WD CLUB</div>
          </div>
        </div>
        <ToastContainer toasts={toasts}/>
      </>
    );
  }

  // ============================================================
  // RENDER: ROOM SELECTION (logged in but no room)
  // ============================================================
  if (!roomName) {
    return (
      <>
        <div className="app-header">
          <div className="header-logo">🏎️ M4WD</div>
          <div style={{flex:1}}/>
          <span className={`header-badge ${role}`}>{role==='admin'?'👑 ADMIN':`👤 ${playerName}`}</span>
          <button className="btn btn-outline btn-sm" onClick={logout}>Đăng xuất</button>
        </div>
        <div className="app-container" style={{padding:'40px 12px'}}>
          <div style={{maxWidth:480,margin:'0 auto'}}>
            <div className="card">
              <div className="card-title">🚪 CHỌN PHÒNG</div>
              {isAdmin ? (
                <>
                  <div className="mb-4">
                    <label className="text-xs text-dim mono" style={{display:'block',marginBottom:6,letterSpacing:2}}>TẠO PHÒNG MỚI</label>
                    <div style={{display:'flex',gap:8}}>
                      <input className="input" placeholder="Tên phòng..." value={formName}
                        onChange={e=>setFormName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&createRoom()}/>
                      <button className="btn btn-gold" onClick={createRoom}>TẠO</button>
                    </div>
                  </div>
                  <div className="divider"/>
                  <div>
                    <label className="text-xs text-dim mono" style={{display:'block',marginBottom:6,letterSpacing:2}}>VÀO PHÒNG SẴN CÓ</label>
                    <div style={{display:'flex',gap:8}}>
                      <input className="input" placeholder="Tên phòng..." value={roomInput}
                        onChange={e=>setRoomInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&joinRoom()}/>
                      <button className="btn btn-outline" onClick={joinRoom}>VÀO</button>
                    </div>
                  </div>
                </>
              ) : (
                <>
                  <div className="text-dim text-sm mb-4">Nhập tên phòng do Admin cung cấp để tham gia</div>
                  <div style={{display:'flex',gap:8}}>
                    <input className="input" placeholder="Tên phòng..." value={roomInput}
                      onChange={e=>setRoomInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&joinRoom()}/>
                    <button className="btn btn-cyan" onClick={joinRoom}>VÀO PHÒNG</button>
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
        <ToastContainer toasts={toasts}/>
      </>
    );
  }

  // ============================================================
  // RENDER: MAIN APP (in room)
  // ============================================================
  const allCarsFlat = Object.entries(guestCars).flatMap(([owner,cars])=>cars.map(c=>({...c,ownerName:owner})));
  const pendingCars = allCarsFlat.filter(c=>c.status==='pending');
  const approvedCars = allCarsFlat.filter(c=>c.status==='approved');

  return (
    <>
      {/* HEADER */}
      <div className="app-header">
        <div className="header-logo">🏎️ M4WD</div>
        <div style={{fontSize:'.9rem',fontWeight:600,color:'var(--gold)'}}>{roomName}</div>
        {tournament && <div style={{fontSize:'.8rem',color:'var(--text-dim)',marginLeft:4}}>· {tournament.name||''}</div>}
        <div style={{flex:1}}/>
        <span className={`header-badge ${role}`}>{role==='admin'?'👑 ADMIN':`👤 ${playerName}`}</span>
        <button className="btn btn-outline btn-sm" onClick={logout}>Đăng xuất</button>
      </div>

      <div className="app-container" style={{padding:'16px 12px'}}>

        {/* ADMIN: no tournament yet */}
        {isAdmin && !tournament && (
          <div style={{maxWidth:600,margin:'0 auto'}}>
            {/* Car approvals */}
            {pendingCars.length > 0 && (
              <div className="card mb-4">
                <div className="card-title">🚗 DUYỆT XE ĐĂNG KÝ ({pendingCars.length})</div>
                {pendingCars.map(car => (
                  <AdminCarRow key={car.id} car={car} onApprove={()=>adminApproveCar(car.ownerName,car.id)}
                    onEdit={newName=>adminEditCar(car.ownerName,car.id,newName)}
                    onDelete={()=>adminDeleteCar(car.ownerName,car.id)}/>
                ))}
              </div>
            )}
            {approvedCars.length > 0 && (
              <div className="card mb-4">
                <div className="card-title">✅ XE ĐÃ DUYỆT ({approvedCars.length})</div>
                {approvedCars.map(car => (
                  <AdminCarRow key={car.id} car={car} approved
                    onEdit={newName=>adminEditCar(car.ownerName,car.id,newName)}
                    onDelete={()=>adminDeleteCar(car.ownerName,car.id)}/>

      {showDiceModal && tournament?.qualifierData[showDiceModal.roundIdx] && (
        <QualifierDiceModal
          group={tournament.qualifierData[showDiceModal.roundIdx].groups[showDiceModal.groupIdx]}
          roundIdx={showDiceModal.roundIdx}
          groupIdx={showDiceModal.groupIdx}
          currentPlayerId={playerName}
          isAdmin={isAdmin}
          onDiceResult={handleQualifierDice}
          onClose={()=>setShowDiceModal(null)}
        />
      )}

      <ToastContainer toasts={toasts}/>
    </>
  );
}

// ============================================================
// ADMIN CAR ROW
// ============================================================
function AdminCarRow({ car, approved, onApprove, onEdit, onDelete }) {
  const [editing, setEditing] = useState(false);
  const [editVal, setEditVal] = useState(car.name);

  const save = () => { onEdit(editVal); setEditing(false); };

  return (
    <div className={approved?'approved-car':'pending-car'}>
      <div style={{flex:1}}>
        {editing ? (
          <input className="input" value={editVal} onChange={e=>setEditVal(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter')save();if(e.key==='Escape'){setEditing(false);setEditVal(car.name);}}}
            style={{padding:'4px 8px',fontSize:'.9rem'}} autoFocus/>
        ) : (
          <span style={{fontWeight:600}}>{car.name}</span>
        )}
        <span className="text-dim text-xs" style={{marginLeft:8,fontFamily:'Share Tech Mono'}}>({car.ownerName})</span>
      </div>
      {!approved&&<span className="badge badge-purple">⏳ Chờ</span>}
      {approved&&<span className="badge badge-green">✅</span>}
      {editing ? (
        <>
          <button className="btn btn-green btn-sm" onClick={save}>💾</button>
          <button className="btn btn-outline btn-sm" onClick={()=>{setEditing(false);setEditVal(car.name);}}>✕</button>
        </>
      ) : (
        <>
          {!approved&&onApprove&&<button className="btn btn-green btn-sm" onClick={onApprove}>✅ Duyệt</button>}
          <button className="btn btn-outline btn-sm" onClick={()=>setEditing(true)}>✏️</button>
          <button className="btn btn-red btn-sm" onClick={onDelete}>🗑️</button>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
