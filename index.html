<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGMS Mini 4WD Tournament Manager</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

    :root {
      --gold: #f5c518; --gold-dim: #c9a000; --red: #e63946; --cyan: #00d4ff;
      --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a24; --border: #2a2a3a;
      --text: #e8e8f0; --text-dim: #7878a0; --green: #2ecc71;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }

    /* UI Components */
    .app-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .header { background: var(--bg2); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Orbitron'; font-weight: 900; color: var(--gold); font-size: 1.5rem; letter-spacing: 3px; }
    
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; font-family: 'Orbitron'; transition: 0.3s; font-size: 0.8rem; }
    .btn-gold { background: var(--gold); color: #000; }
    .btn-gold:disabled { background: var(--text-dim); cursor: not-allowed; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .input { background: var(--bg3); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 6px; width: 100%; outline: none; margin-bottom: 10px; }
    
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
    .tab { padding: 10px 15px; cursor: pointer; color: var(--text-dim); font-family: 'Orbitron'; font-size: 0.75rem; }
    .tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

    /* Matching & Brackets */
    .match-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .match-box { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .match-box.active { border-color: var(--gold); box-shadow: 0 0 15px rgba(245, 197, 24, 0.2); }
    .match-header { padding: 5px 10px; background: rgba(255,255,255,0.05); font-size: 0.7rem; font-family: 'Orbitron'; color: var(--gold); display: flex; justify-content: space-between; }
    
    .player-row { padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .player-row:last-child { border-bottom: none; }
    .winner { background: rgba(46, 204, 113, 0.1); }
    .out-stamp { border: 1px solid var(--red); color: var(--red); padding: 2px 5px; font-size: 0.6rem; font-weight: 900; border-radius: 3px; }

    .dice-btn { width: 35px; height: 35px; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer; font-family: 'Orbitron'; font-weight: 900; color: var(--gold); }
    .score-input { width: 50px; background: #000; border: 1px solid var(--border); color: var(--gold); text-align: center; font-weight: bold; padding: 5px; }
    
    .lane-badge { font-family: 'Share Tech Mono'; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    .lane-1 { background: var(--red); color: white; }
    .lane-2 { background: var(--gold); color: black; }
    .lane-3 { background: var(--cyan); color: black; }
  </style>
</head>
<body>
  <div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// --- Helper Functions ---
const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);
const getTargetSize = (n) => n < 16 ? 8 : (n < 32 ? 16 : 32);

function App() {
  const [user, setUser] = useState(null);
  const [tournament, setTournament] = useState(() => {
    const saved = localStorage.getItem('m4wd_data');
    return saved ? JSON.parse(saved) : null;
  });
  const [activeTab, setActiveTab] = useState('info');
  const [passInput, setPassInput] = useState('');
  const [guestName, setGuestName] = useState('');

  // Lưu dữ liệu vào LocalStorage mỗi khi có thay đổi
  useEffect(() => {
    if (tournament) {
      localStorage.setItem('m4wd_data', JSON.stringify(tournament));
    }
  }, [tournament]);

  const loginAdmin = () => {
    if (passInput === 'Phuong090') setUser({ role: 'admin', name: 'Admin' });
    else alert('Mật khẩu sai!');
  };

  const loginGuest = () => {
    if (!guestName.trim()) return alert('Vui lòng nhập tên!');
    setUser({ role: 'guest', name: guestName.trim() });
  };

  const initTournament = (name) => {
    setTournament({
      name,
      phase: 'registration', // registration -> jackpot -> qualifier -> bracket
      players: [],
      matches: [],
      history: []
    });
  };

  const addPlayer = (name) => {
    if (tournament.players.some(p => p.name === name)) return alert('Tên đã tồn tại!');
    const newP = { id: Date.now(), name, jackpotId: null, totalScore: 0, status: 'active', currentLane: null };
    setTournament(t => ({ ...t, players: [...t.players, newP] }));
  };

  // --- Logic Chia Bảng Vòng Loại (Không lẻ người) ---
  const startQualifiers = () => {
    let pList = shuffle(tournament.players.filter(p => p.status === 'active'));
    let newMatches = [];
    
    while (pList.length > 0) {
      let size = 3;
      if (pList.length === 4 || pList.length === 2) size = 2; // Xử lý để không lẻ 1
      const group = pList.splice(0, size);
      newMatches.push({
        id: 'Q-' + Math.random(),
        players: group.map(p => ({ ...p, matchScore: 0, lane: null })),
        isDone: false
      });
    }
    setTournament(t => ({ ...t, phase: 'qualifier', matches: newMatches }));
  };

  // --- Logic Xóc Xúc Xắc ---
  const rollLane = (matchId, playerId) => {
    setTournament(t => {
      const match = t.matches.find(m => m.id === matchId);
      const playersInMatch = match.players;
      const rolled = playersInMatch.map(p => p.lane).filter(l => l !== null);
      
      let available = playersInMatch.length === 2 ? [1, 3] : [1, 2, 3];
      available = available.filter(l => !rolled.includes(l));
      
      if (available.length === 0) return t;
      const result = available[Math.floor(Math.random() * available.length)];

      return {
        ...t,
        matches: t.matches.map(m => m.id === matchId ? {
          ...m,
          players: m.players.map(p => p.id === playerId ? { ...p, lane: result } : p)
        } : m)
      };
    });
  };

  const submitMatch = (matchId) => {
    setTournament(t => {
      const match = t.matches.find(m => m.id === matchId);
      const updatedPlayers = t.players.map(p => {
        const pm = match.players.find(x => x.id === p.id);
        return pm ? { ...p, totalScore: p.totalScore + pm.matchScore } : p;
      });
      return {
        ...t,
        players: updatedPlayers,
        matches: t.matches.map(m => m.id === matchId ? { ...m, isDone: true } : m)
      };
    });
  };

  const finalizeQualifiers = () => {
    const target = getTargetSize(tournament.players.length);
    const sorted = [...tournament.players].sort((a,b) => b.totalScore - a.totalScore);
    const finalized = sorted.map((p, i) => ({
      ...p,
      status: i < target ? 'active' : 'out'
    }));
    setTournament(t => ({ ...t, players: finalized, phase: 'bracket_ready', matches: [] }));
  };

  // --- Render Login ---
  if (!user) return (
    <div className="login-container" style={{ height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div className="card" style={{ width: '350px' }}>
        <h2 style={{ fontFamily: 'Orbitron', color: 'var(--gold)', textAlign: 'center', marginBottom: '25px' }}>SGMS M4WD</h2>
        <input className="input" type="password" placeholder="Admin Pass" onChange={e => setPassInput(e.target.value)} />
        <button className="btn btn-gold" onClick={loginAdmin} style={{ width: '100%' }}>ADMIN LOGIN</button>
        <div style={{ margin: '20px 0', textAlign: 'center', color: 'var(--text-dim)', fontSize: '0.7rem' }}>--- OR ---</div>
        <input className="input" placeholder="Tên của bạn" onChange={e => setGuestName(e.target.value)} />
        <button className="btn btn-outline" onClick={loginGuest} style={{ width: '100%' }}>GUEST VIEW</button>
      </div>
    </div>
  );

  return (
    <div>
      <header className="header">
        <div className="logo">SGMS TOURNAMENT</div>
        <div style={{ display: 'flex', gap: '15px' }}>
          <span className="lane-badge" style={{ background: 'var(--gold)', color: 'black' }}>{user.name}</span>
          <button onClick={() => { localStorage.removeItem('m4wd_data'); location.reload(); }} className="btn btn-outline" style={{ padding: '5px 10px' }}>RESET</button>
        </div>
      </header>

      <div className="app-container">
        {!tournament ? (
          <div className="card" style={{ maxWidth: '400px', margin: 'auto' }}>
            <h3 style={{ fontFamily: 'Orbitron', marginBottom: '15px' }}>TẠO GIẢI MỚI</h3>
            <input className="input" id="tn" placeholder="Tên giải đấu" />
            <button className="btn btn-gold" style={{ width: '100%' }} onClick={() => initTournament(document.getElementById('tn').value)}>KHỞI TẠO</button>
          </div>
        ) : (
          <>
            <div className="tabs">
              <div className={`tab ${activeTab === 'info' ? 'active' : ''}`} onClick={() => setActiveTab('info')}>THÔNG TIN</div>
              <div className={`tab ${activeTab === 'play' ? 'active' : ''}`} onClick={() => setActiveTab('play')}>THI ĐẤU</div>
              <div className={`tab ${activeTab === 'rank' ? 'active' : ''}`} onClick={() => setActiveTab('rank')}>XẾP HẠNG</div>
            </div>

            {activeTab === 'info' && (
              <div className="card">
                <h2>{tournament.name}</h2>
                <p style={{ color: 'var(--text-dim)', fontSize: '0.8rem', marginBottom: '20px' }}>Giai đoạn: {tournament.phase.toUpperCase()}</p>
                
                {tournament.phase === 'registration' && (
                  <div>
                    <div style={{ display: 'flex', gap: '10px', marginBottom: '20px' }}>
                      <input className="input" id="pn" placeholder="Tên Racer" style={{ marginBottom: 0 }} />
                      <button className="btn btn-gold" onClick={() => addPlayer(document.getElementById('pn').value)}>ĐĂNG KÝ</button>
                    </div>
                    <div className="match-grid">
                      {tournament.players.map(p => (
                        <div key={p.id} className="player-row" style={{ background: 'var(--bg3)', borderRadius: '6px' }}>
                          <span>{p.name}</span>
                          {user.role === 'admin' && <button style={{ color: 'red', border: 'none', background: 'none' }} onClick={() => setTournament(t => ({ ...t, players: t.players.filter(x => x.id !== p.id) }))}>XÓA</button>}
                        </div>
                      ))}
                    </div>
                    {user.role === 'admin' && tournament.players.length >= 2 && (
                      <button className="btn btn-gold" style={{ width: '100%', marginTop: '20px' }} onClick={() => setTournament(t => ({ ...t, phase: 'jackpot' }))}>KHÓA DANH SÁCH & QUAY ID</button>
                    )}
                  </div>
                )}

                {tournament.phase === 'jackpot' && (
                  <div className="match-grid">
                    {tournament.players.map(p => (
                      <div key={p.id} className="card" style={{ textAlign: 'center' }}>
                        <div style={{ fontSize: '0.8rem', color: 'var(--text-dim)' }}>{p.name}</div>
                        <div style={{ fontFamily: 'Orbitron', fontSize: '2rem', color: 'var(--gold)', margin: '10px 0' }}>{p.jackpotId || '??'}</div>
                        {!p.jackpotId && (user.role === 'admin' || user.name === p.name) && (
                          <button className="btn btn-gold" onClick={() => {
                            const num = Math.floor(Math.random() * 90 + 10);
                            setTournament(t => ({ ...t, players: t.players.map(x => x.id === p.id ? { ...x, jackpotId: num } : x) }));
                          }}>QUAY ID</button>
                        )}
                      </div>
                    ))}
                    {user.role === 'admin' && tournament.players.every(p => p.jackpotId) && (
                      <button className="btn btn-gold" style={{ gridColumn: '1/-1' }} onClick={startQualifiers}>BẮT ĐẦU VÒNG LOẠI</button>
                    )}
                  </div>
                )}
              </div>
            )}

            {activeTab === 'play' && (
              <div className="match-grid">
                {tournament.matches.map((m, idx) => (
                  <div key={m.id} className={`match-box ${!m.isDone ? 'active' : ''}`}>
                    <div className="match-header">
                       <span>VÁN {idx + 1}</span>
                       <span>{m.isDone ? 'HOÀN TẤT' : 'ĐANG ĐUA'}</span>
                    </div>
                    {m.players.map(p => (
                      <div key={p.id} className="player-row">
                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                          <span className={`lane-badge lane-${p.lane}`}>{p.lane || '?'}</span>
                          <span>{p.name}</span>
                        </div>
                        <div style={{ display: 'flex', gap: '10px' }}>
                          {!p.lane && (user.role === 'admin' || user.name === p.name) && (
                            <div className="dice-btn" onClick={() => rollLane(m.id, p.id)}>🎲</div>
                          )}
                          {user.role === 'admin' && !m.isDone ? (
                            <input className="score-input" type="number" onChange={(e) => {
                              const val = parseInt(e.target.value);
                              setTournament(t => ({
                                ...t,
                                matches: t.matches.map(mx => mx.id === m.id ? {
                                  ...mx,
                                  players: mx.players.map(px => px.id === p.id ? { ...px, matchScore: val } : px)
                                } : mx)
                              }));
                            }} />
                          ) : <span style={{ fontWeight: 'bold' }}>{p.matchScore}</span>}
                        </div>
                      </div>
                    ))}
                    {user.role === 'admin' && !m.isDone && (
                      <button className="btn btn-gold" style={{ width: '100%', borderRadius: 0 }} onClick={() => submitMatch(m.id)}>CHỐT ĐIỂM</button>
                    )}
                  </div>
                ))}
                {user.role === 'admin' && tournament.phase === 'qualifier' && tournament.matches.every(m => m.isDone) && (
                  <button className="btn btn-gold" style={{ gridColumn: '1/-1' }} onClick={finalizeQualifiers}>KẾT THÚC VÒNG LOẠI</button>
                )}
              </div>
            )}

            {activeTab === 'rank' && (
              <div className="card">
                <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                  <thead>
                    <tr style={{ color: 'var(--gold)', textAlign: 'left', borderBottom: '1px solid var(--border)' }}>
                      <th style={{ padding: '10px' }}>ID</th>
                      <th>RACER</th>
                      <th>ĐIỂM</th>
                      <th>TRẠNG THÁI</th>
                    </tr>
                  </thead>
                  <tbody>
                    {tournament.players.sort((a,b) => b.totalScore - a.totalScore).map(p => (
                      <tr key={p.id} style={{ borderBottom: '1px solid rgba(255,255,255,0.05)', opacity: p.status === 'out' ? 0.4 : 1 }}>
                        <td style={{ padding: '10px', fontFamily: 'Orbitron' }}>{p.jackpotId}</td>
                        <td style={{ fontWeight: 'bold' }}>{p.name}</td>
                        <td style={{ color: 'var(--gold)', fontWeight: 'bold' }}>{p.totalScore}</td>
                        <td>{p.status === 'out' ? <span className="out-stamp">OUT</span> : <span style={{ color: 'var(--green)', fontSize: '0.7rem' }}>ACTIVE</span>}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
