<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏆 Mini 4WD Tournament Manager</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

    :root {
      --gold: #f5c518;
      --gold-dim: #c9a000;
      --red: #e63946;
      --red-dim: #a02630;
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #1a1a24;
      --bg4: #22222f;
      --border: #2a2a3a;
      --text: #e8e8f0;
      --text-dim: #7878a0;
      --green: #2ecc71;
      --cyan: #00d4ff;
      --purple: #9b59b6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

    /* ANIMATIONS */
    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 10px var(--gold), 0 0 20px var(--gold)40; }
      50% { box-shadow: 0 0 20px var(--gold), 0 0 40px var(--gold)80; }
    }
    @keyframes spin-reel {
      0% { transform: translateY(0); }
      100% { transform: translateY(-900%); }
    }
    @keyframes stamp-in {
      0% { transform: scale(3) rotate(-15deg); opacity: 0; }
      60% { transform: scale(0.9) rotate(2deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes slide-in-right {
      from { transform: translateX(60px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slide-in-up {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    @keyframes dice-roll {
      0% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(180deg) scale(1.3); }
      50% { transform: rotate(360deg) scale(0.8); }
      75% { transform: rotate(540deg) scale(1.2); }
      100% { transform: rotate(720deg) scale(1); }
    }
    @keyframes scan-line {
      0% { top: -4px; }
      100% { top: 100%; }
    }
    @keyframes bg-grid {
      0% { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }
    @keyframes winner-flash {
      0%,100% { background: var(--gold)20; border-color: var(--gold); }
      50% { background: var(--gold)50; border-color: var(--gold); box-shadow: 0 0 30px var(--gold); }
    }
    @keyframes number-pop {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes jackpot-glow {
      0%,100% { text-shadow: 0 0 10px var(--gold), 0 0 20px var(--gold); }
      50% { text-shadow: 0 0 20px var(--gold), 0 0 40px var(--gold), 0 0 60px var(--gold); }
    }

    /* LAYOUT */
    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 12px;
    }

    /* HEADER */
    .app-header {
      background: linear-gradient(135deg, var(--bg2), var(--bg3));
      border-bottom: 2px solid var(--gold)40;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 20px var(--gold)80;
      letter-spacing: 2px;
    }
    .header-badge {
      background: var(--bg4);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.75rem;
      color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
    }
    .header-badge.admin { border-color: var(--gold); color: var(--gold); }
    .header-badge.guest { border-color: var(--cyan); color: var(--cyan); }

    /* CARDS */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .card-title {
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 2px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      color: #000;
    }
    .btn-gold:hover:not(:disabled) {
      box-shadow: 0 0 20px var(--gold)80;
      transform: translateY(-1px);
    }
    .btn-red {
      background: linear-gradient(135deg, var(--red), var(--red-dim));
      color: #fff;
    }
    .btn-red:hover:not(:disabled) { box-shadow: 0 0 15px var(--red)60; transform: translateY(-1px); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
    .btn-cyan {
      background: linear-gradient(135deg, var(--cyan)30, var(--cyan)10);
      border: 1px solid var(--cyan);
      color: var(--cyan);
    }
    .btn-cyan:hover:not(:disabled) { box-shadow: 0 0 15px var(--cyan)40; }
    .btn-green {
      background: linear-gradient(135deg, var(--green)30, var(--green)10);
      border: 1px solid var(--green);
      color: var(--green);
    }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
    .btn-lg { padding: 14px 32px; font-size: 1.1rem; }
    .btn-xl { padding: 20px 48px; font-size: 1.3rem; }

    /* INPUTS */
    .input {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      width: 100%;
      transition: border-color 0.2s;
    }
    .input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold)20; }
    .input::placeholder { color: var(--text-dim); }

    /* BADGES */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 1px;
    }
    .badge-gold { background: var(--gold)20; border: 1px solid var(--gold); color: var(--gold); }
    .badge-red { background: var(--red)20; border: 1px solid var(--red); color: var(--red); }
    .badge-green { background: var(--green)20; border: 1px solid var(--green); color: var(--green); }
    .badge-cyan { background: var(--cyan)20; border: 1px solid var(--cyan); color: var(--cyan); }
    .badge-dim { background: var(--bg4); border: 1px solid var(--border); color: var(--text-dim); }

    /* LOGIN SCREEN */
    .login-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, var(--gold)08 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, var(--red)06 0%, transparent 50%),
        var(--bg);
      position: relative;
      overflow: hidden;
    }
    .login-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      animation: bg-grid 8s linear infinite;
    }
    .login-logo {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 900;
      color: var(--gold);
      text-align: center;
      line-height: 1.2;
      animation: jackpot-glow 3s ease-in-out infinite;
      margin-bottom: 8px;
      position: relative;
    }
    .login-subtitle {
      color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      text-align: center;
      letter-spacing: 3px;
      margin-bottom: 48px;
      position: relative;
    }
    .login-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      position: relative;
      animation: slide-in-up 0.4s ease;
    }

    /* JACKPOT REEL */
    .jackpot-container {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
    }
    .jackpot-reel-wrapper {
      width: 72px;
      height: 80px;
      background: var(--bg);
      border: 2px solid var(--gold);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 0 20px var(--gold)20, 0 0 15px var(--gold)30;
    }
    .jackpot-reel-wrapper::before, .jackpot-reel-wrapper::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 24px;
      z-index: 2;
      pointer-events: none;
    }
    .jackpot-reel-wrapper::before {
      top: 0;
      background: linear-gradient(to bottom, var(--bg2) 0%, transparent 100%);
    }
    .jackpot-reel-wrapper::after {
      bottom: 0;
      background: linear-gradient(to top, var(--bg2) 0%, transparent 100%);
    }
    .jackpot-reel-track {
      display: flex;
      flex-direction: column;
      transition: transform 0.05s;
    }
    .jackpot-reel-track.spinning {
      animation: spin-reel 0.1s linear infinite;
    }
    .jackpot-digit {
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', monospace;
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 15px var(--gold)80;
      flex-shrink: 0;
    }
    .jackpot-result {
      font-family: 'Orbitron', monospace;
      font-size: 2rem;
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 20px var(--gold);
      animation: number-pop 0.4s ease;
    }

    /* DICE */
    .dice-face {
      width: 72px;
      height: 72px;
      background: var(--bg3);
      border: 2px solid var(--gold);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', monospace;
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--gold);
      box-shadow: 0 0 15px var(--gold)30;
      position: relative;
      cursor: pointer;
      transition: all 0.2s;
    }
    .dice-face.rolling {
      animation: dice-roll 0.8s ease;
    }
    .dice-face:hover:not(.locked):not(.rolling) {
      box-shadow: 0 0 25px var(--gold)60;
      transform: scale(1.05);
    }
    .dice-face.locked {
      border-color: var(--green);
      color: var(--green);
      box-shadow: 0 0 15px var(--green)30;
      cursor: default;
    }

    /* PLAYER ROW */
    .player-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      animation: slide-in-right 0.3s ease;
    }
    .player-row:hover { border-color: var(--gold)40; }
    .player-row.out { opacity: 0.5; filter: grayscale(0.7); }

    /* BRACKET */
    .bracket-container {
      overflow-x: auto;
      padding-bottom: 20px;
    }
    .bracket-section-title {
      font-family: 'Orbitron', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 3px;
      margin: 20px 0 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bracket-round-col {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      min-width: 180px;
    }
    .bracket-round-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      text-align: center;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .match-box {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin: 4px 0;
      transition: all 0.3s;
      position: relative;
    }
    .match-box.active {
      border-color: var(--gold);
      box-shadow: 0 0 15px var(--gold)30;
      animation: glow-pulse 2s ease-in-out infinite;
    }
    .match-box.completed { border-color: var(--border); }
    .match-player {
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }
    .match-player:last-child { border-bottom: none; }
    .match-player.winner { background: var(--gold)15; color: var(--gold); font-weight: 700; }
    .match-player.loser { background: transparent; color: var(--text-dim); }
    .match-player.bye { background: var(--cyan)10; color: var(--cyan); }
    .match-number-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--gold);
      background: var(--gold)15;
      padding: 1px 5px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .match-score {
      font-family: 'Orbitron', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      margin-left: auto;
      min-width: 20px;
      text-align: right;
    }

    /* SCORE BUTTONS */
    .score-btn {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      border: 2px solid var(--border);
      background: var(--bg4);
      color: var(--text);
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .score-btn:hover { border-color: var(--gold); color: var(--gold); }
    .score-btn.selected { border-color: var(--gold); background: var(--gold)20; color: var(--gold); box-shadow: 0 0 10px var(--gold)40; }

    /* TABS */
    .tab-bar {
      display: flex;
      gap: 4px;
      background: var(--bg2);
      padding: 4px;
      border-radius: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .tab {
      flex: 1;
      min-width: 80px;
      padding: 8px 16px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--text-dim);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
      white-space: nowrap;
    }
    .tab.active { background: var(--bg4); color: var(--gold); }
    .tab:hover:not(.active) { color: var(--text); }

    /* PROGRESS BAR */
    .progress-bar {
      background: var(--bg3);
      border-radius: 20px;
      height: 6px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--red));
      border-radius: 20px;
      transition: width 0.5s ease;
    }

    /* OUT stamp */
    .out-stamp {
      display: inline-block;
      font-family: 'Orbitron', monospace;
      font-size: 0.75rem;
      font-weight: 900;
      color: var(--red);
      border: 2px solid var(--red);
      border-radius: 4px;
      padding: 1px 6px;
      letter-spacing: 2px;
      animation: stamp-in 0.3s ease;
    }

    /* LEADERBOARD */
    .lb-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 4px;
      font-size: 0.9rem;
      transition: all 0.3s;
    }
    .lb-row.qualify { background: var(--gold)10; border: 1px solid var(--gold)30; }
    .lb-row.eliminate { background: var(--red)05; border: 1px solid var(--border); opacity: 0.6; }
    .lb-rank {
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      font-weight: 900;
      color: var(--gold);
      min-width: 32px;
    }
    .lb-score {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      font-weight: 900;
      margin-left: auto;
    }

    /* TOAST */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--bg3);
      border: 1px solid var(--gold);
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 0.85rem;
      animation: slide-in-right 0.3s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      max-width: 300px;
    }
    .toast.error { border-color: var(--red); }
    .toast.success { border-color: var(--green); }

    /* PHASE INDICATOR */
    .phase-steps {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .phase-step {
      flex: 1;
      min-width: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      position: relative;
    }
    .phase-step::after {
      content: '';
      position: absolute;
      top: 14px;
      left: 50%;
      right: -50%;
      height: 2px;
      background: var(--border);
    }
    .phase-step:last-child::after { display: none; }
    .phase-step.done::after { background: var(--gold); }
    .phase-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--bg3);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }
    .phase-step.done .phase-dot { background: var(--gold); border-color: var(--gold); color: #000; }
    .phase-step.active .phase-dot { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 10px var(--gold)60; }
    .phase-label {
      font-size: 0.65rem;
      font-family: 'Share Tech Mono', monospace;
      color: var(--text-dim);
      text-align: center;
      letter-spacing: 1px;
    }
    .phase-step.active .phase-label, .phase-step.done .phase-label { color: var(--gold); }

    /* CONNECTOR LINES for bracket */
    .bracket-grid {
      display: flex;
      gap: 0;
      align-items: stretch;
    }
    .connector-col {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      width: 24px;
      flex-shrink: 0;
    }

    /* RESPONSIVE */
    @media (max-width: 640px) {
      .login-card { padding: 20px; }
      .btn-xl { padding: 14px 28px; font-size: 1.1rem; }
      .app-header { padding: 8px 12px; }
    }

    /* Utility */
    .mono { font-family: 'Share Tech Mono', monospace; }
    .orbitron { font-family: 'Orbitron', monospace; }
    .text-gold { color: var(--gold); }
    .text-red { color: var(--red); }
    .text-green { color: var(--green); }
    .text-cyan { color: var(--cyan); }
    .text-dim { color: var(--text-dim); }
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .justify-center { justify-content: center; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .gap-4 { gap: 16px; }
    .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 12px; }
    .mb-4 { margin-bottom: 16px; }
    .mb-6 { margin-bottom: 24px; }
    .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 12px; }
    .mt-4 { margin-top: 16px; }
    .p-2 { padding: 8px; }
    .p-3 { padding: 12px; }
    .w-full { width: 100%; }
    .text-center { text-align: center; }
    .text-sm { font-size: 0.85rem; }
    .text-xs { font-size: 0.75rem; }
    .font-bold { font-weight: 700; }

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ============================================================
// UTILITIES
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function nextPowerOf2(n) {
  let p = 1;
  while (p < n) p *= 2;
  return p;
}

function getBracketTarget(count) {
  if (count <= 8) return 8;
  if (count <= 16) return 16;
  if (count <= 32) return 32;
  return 64;
}

function needsQualifier(count) {
  return count !== 8 && count !== 16 && count !== 32;
}

// ============================================================
// TOAST SYSTEM
// ============================================================
function ToastContainer({ toasts }) {
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

// ============================================================
// JACKPOT REEL COMPONENT
// ============================================================
function JackpotReel({ onResult, disabled, existingNumbers, label }) {
  const [spinning, setSpinning] = useState(false);
  const [result, setResult] = useState(null);
  const [digits, setDigits] = useState(['?', '?']);
  const intervalRef = useRef(null);
  const timeoutRef = useRef(null);

  const spin = () => {
    if (spinning || disabled || result !== null) return;
    setSpinning(true);
    setDigits(['?', '?']);

    let ticks = 0;
    intervalRef.current = setInterval(() => {
      setDigits([Math.floor(Math.random() * 10), Math.floor(Math.random() * 10)]);
      ticks++;
    }, 80);

    timeoutRef.current = setTimeout(() => {
      clearInterval(intervalRef.current);
      let num;
      let attempts = 0;
      do {
        num = Math.floor(Math.random() * 100).toString().padStart(2, '0');
        attempts++;
      } while (existingNumbers.includes(num) && attempts < 200);

      const d = num.split('');
      setDigits(d);
      setResult(num);
      setSpinning(false);
      onResult(num);
    }, 2000 + Math.random() * 500);
  };

  useEffect(() => () => {
    clearInterval(intervalRef.current);
    clearTimeout(timeoutRef.current);
  }, []);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
      {label && <div className="text-xs text-dim mono" style={{ letterSpacing: 2 }}>{label}</div>}
      <div style={{ display: 'flex', gap: 6 }}>
        {[0, 1].map(i => (
          <div key={i} className="jackpot-reel-wrapper">
            <div style={{
              display: 'flex',
              flexDirection: 'column',
              height: '100%',
              alignItems: 'center',
              justifyContent: 'center'
            }}>
              <span className="jackpot-digit" style={{ lineHeight: '80px' }}>
                {digits[i]}
              </span>
            </div>
          </div>
        ))}
      </div>
      {result ? (
        <div style={{ textAlign: 'center' }}>
          <div className="jackpot-result">{result}</div>
          <div className="badge badge-gold mt-2">ĐÃ KHÓA</div>
        </div>
      ) : (
        <button
          className="btn btn-gold btn-sm"
          onClick={spin}
          disabled={disabled || spinning}
        >
          {spinning ? '🎰 Đang quay...' : '🎰 QUAY SỐ'}
        </button>
      )}
    </div>
  );
}

// ============================================================
// DICE ROLLER COMPONENT
// ============================================================
function DiceRoller({ allowedValues, onResult, disabled, locked, lockedValue }) {
  const [rolling, setRolling] = useState(false);
  const [displayVal, setDisplayVal] = useState('?');

  const roll = () => {
    if (rolling || disabled || locked) return;
    setRolling(true);
    let ticks = 0;
    const iv = setInterval(() => {
      const v = allowedValues[Math.floor(Math.random() * allowedValues.length)];
      setDisplayVal(v);
      ticks++;
      if (ticks > 15) {
        clearInterval(iv);
        const finalVal = allowedValues[Math.floor(Math.random() * allowedValues.length)];
        setDisplayVal(finalVal);
        setRolling(false);
        onResult(finalVal);
      }
    }, 60);
  };

  const val = locked ? lockedValue : displayVal;
  const laneClass = val === 1 ? 'lane-1' : val === 2 ? 'lane-2' : val === 3 ? 'lane-3' : '';

  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
      <div
        className={`dice-face${rolling ? ' rolling' : ''}${locked ? ' locked' : ''}`}
        onClick={roll}
        title={locked ? 'Đã khóa' : 'Nhấn để xóc xúc xắc'}
      >
        {val === '?' ? '?' : val}
      </div>
      {locked ? (
        <span className={`lane-badge ${laneClass}`}>LANE {val}</span>
      ) : (
        <span className="text-xs text-dim" style={{ fontFamily: 'Share Tech Mono' }}>
          {rolling ? 'đang xóc...' : disabled ? '🔒' : 'nhấn xóc'}
        </span>
      )}
    </div>
  );
}

// ============================================================
// PHASE INDICATOR
// ============================================================
function PhaseIndicator({ phase }) {
  const phases = [
    { id: 'setup', label: 'SETUP' },
    { id: 'jackpot', label: 'QUAY SỐ' },
    { id: 'qualifier', label: 'VÒNG LOẠI' },
    { id: 'bracketSeed', label: 'XẾP BẢNG' },
    { id: 'bracket', label: 'BẢNG ĐẤU' },
    { id: 'complete', label: 'KẾT THÚC' },
  ];

  const phaseOrder = phases.map(p => p.id);
  const currentIdx = phaseOrder.indexOf(phase);

  return (
    <div className="phase-steps">
      {phases.map((p, i) => {
        const isDone = i < currentIdx;
        const isActive = i === currentIdx;
        return (
          <div key={p.id} className={`phase-step ${isDone ? 'done' : ''} ${isActive ? 'active' : ''}`}>
            <div className="phase-dot">{isDone ? '✓' : i + 1}</div>
            <div className="phase-label">{p.label}</div>
          </div>
        );
      })}
    </div>
  );
}

// ============================================================
// BRACKET BUILDER LOGIC
// ============================================================
function buildDoubleEliminationBracket(players) {
  // players: array of player objects, length must be power of 2
  // Returns { winnersRounds, losersRounds, grandFinal }
  const n = players.length;
  // Winners bracket: round 1 has n/2 matches
  // Build initial seeding: player[0] vs player[n-1], player[1] vs player[n-2], etc.
  const seeded = [...players];

  // Build match ids
  let matchCounter = 1;
  const makeMatch = (p1, p2, round, bracket, position) => ({
    matchId: `${bracket}_R${round}_M${matchCounter++}`,
    p1: p1 || null,
    p2: p2 || null,
    p1Lane: null,
    p2Lane: null,
    p1Score: null,
    p2Score: null,
    winnerId: null,
    loserId: null,
    status: 'pending', // pending | active | complete
    round,
    bracket,
    position,
    isBye: !p1 || !p2,
  });

  // Winners bracket rounds
  const wRounds = [];
  // Round 1
  const r1Matches = [];
  for (let i = 0; i < n / 2; i++) {
    r1Matches.push(makeMatch(seeded[i], seeded[n - 1 - i], 1, 'W', i));
  }
  wRounds.push(r1Matches);

  // Subsequent winner rounds (placeholders)
  let remaining = n / 2;
  let rn = 2;
  while (remaining > 1) {
    remaining = Math.ceil(remaining / 2);
    const round = [];
    for (let i = 0; i < remaining; i++) {
      round.push(makeMatch(null, null, rn, 'W', i));
    }
    wRounds.push(round);
    rn++;
  }

  // Losers bracket (complex structure)
  // Standard double-elimination losers bracket
  // LB receives losers from WB each round
  const lRounds = [];
  // We'll build it dynamically during match processing

  return { winnersRounds: wRounds, losersRounds: lRounds, grandFinal: null, matchHistory: {} };
}

// Anti-repeat algorithm: find best placement
function findBestPlacement(player, slots, history) {
  if (slots.length === 0) return 0;
  let bestScore = Infinity;
  let bestIdx = 0;
  slots.forEach((opponent, idx) => {
    if (!opponent) { bestIdx = idx; bestScore = -1; return; }
    const prevMeetings = (history[player.id] || []).filter(id => id === opponent.id).length;
    if (prevMeetings < bestScore) {
      bestScore = prevMeetings;
      bestIdx = idx;
    }
  });
  return bestIdx;
}

      ...prev,
      players: prev.players.map(p =>
        p.id === playerId ? { ...p, jackpotNumber: number } : p
      )
    }));
    toast(`🎰 Số ${number} đã được gán!`, 'success');
  };

  const allJackpotsAssigned = tournament?.players.every(p => p.jackpotNumber !== null);

  const proceedFromJackpot = () => {
    if (!allJackpotsAssigned) { toast('⚠️ Tất cả người chơi phải quay số!', 'error'); return; }
    if (tournament.hasQualifier) {
      setTournament(prev => ({ ...prev, phase: 'qualifier' }));
      initQualifierRound(tournament, 1);
    } else {
      setTournament(prev => ({ ...prev, phase: 'bracketSeed' }));
    }
    toast('✅ Chuyển sang giai đoạn tiếp!', 'success');
  };

  // ---- Qualifier Rounds ----
  const initQualifierRound = (t, roundNum) => {
    const activePlayers = t.players.filter(p => p.status === 'active');
    const shuffled = shuffle(activePlayers);
    const groups = [];
    let i = 0;
    while (i < shuffled.length) {
      const remaining = shuffled.length - i;
      if (remaining === 2 || remaining === 1) {
        groups.push(shuffled.slice(i));
        i += remaining;
      } else {
        groups.push(shuffled.slice(i, i + 3));
        i += 3;
      }
    }
    const roundData = {
      round: roundNum,
      groups: groups.map(g => ({
        players: g,
        lanes: {},
        scores: {},
        complete: false,
      }))
    };

    setTournament(prev => ({
      ...prev,
      qualifierData: [...(prev.qualifierData || []), roundData],
      currentQualifierRound: roundNum,
    }));
  };

  const handleQualifierDice = (roundIdx, groupIdx, playerId, value) => {
    setTournament(prev => {
      const newData = prev.qualifierData.map((rd, ri) => {
        if (ri !== roundIdx) return rd;
        return {
          ...rd,
          groups: rd.groups.map((g, gi) => {
            if (gi !== groupIdx) return g;
            return { ...g, lanes: { ...g.lanes, [playerId]: value } };
          })
        };
      });
      return { ...prev, qualifierData: newData };
    });
  };

  const handleQualifierScore = (roundIdx, groupIdx, playerId, score) => {
    setTournament(prev => {
      const newData = prev.qualifierData.map((rd, ri) => {
        if (ri !== roundIdx) return rd;
        return {
          ...rd,
          groups: rd.groups.map((g, gi) => {
            if (gi !== groupIdx) return g;
            return { ...g, scores: { ...g.scores, [playerId]: score } };
          })
        };
      });
      return { ...prev, qualifierData: newData };
    });
  };

  const completeQualifierGroup = (roundIdx, groupIdx) => {
    setTournament(prev => {
      const group = prev.qualifierData[roundIdx].groups[groupIdx];
      // Validate all players have dice and score
      for (const p of group.players) {
        if (group.lanes[p.id] === undefined) {
          toast('⚠️ Chưa xóc xúc xắc!', 'error');
          return prev;
        }
        if (group.scores[p.id] === undefined) {
          toast('⚠️ Chưa nhập điểm!', 'error');
          return prev;
        }
      }
      // Update players' qualifier scores
      let updatedPlayers = prev.players.map(p => {
        const s = group.scores[p.id];
        if (s !== undefined) return { ...p, qualifierScore: (p.qualifierScore || 0) + s };
        return p;
      });
      const newData = prev.qualifierData.map((rd, ri) => {
        if (ri !== roundIdx) return rd;
        return {
          ...rd,
          groups: rd.groups.map((g, gi) => {
            if (gi !== groupIdx) return g;
            return { ...g, complete: true };
          })
        };
      });
      return { ...prev, qualifierData: newData, players: updatedPlayers };
    });
    toast('✅ Ván đấu hoàn thành!', 'success');
  };

  const isQualifierRoundComplete = (roundIdx) => {
    if (!tournament?.qualifierData[roundIdx]) return false;
    return tournament.qualifierData[roundIdx].groups.every(g => g.complete);
  };

  const advanceQualifierRound = () => {
    const nextRound = tournament.currentQualifierRound + 1;
    if (nextRound <= tournament.qualifierRounds) {
      initQualifierRound(tournament, nextRound);
      toast(`✅ Bắt đầu vòng loại ${nextRound}!`, 'success');
    } else {
      // All qualifier rounds done — finalize
      finalizeQualifiers();
    }
  };

  const finalizeQualifiers = () => {
    const target = tournament.bracketTarget;
    const sorted = [...tournament.players].sort((a, b) => (b.qualifierScore || 0) - (a.qualifierScore || 0));
    const qualifiedPlayers = sorted.slice(0, target).map(p => ({ ...p, status: 'active' }));
    const eliminatedPlayers = sorted.slice(target).map(p => ({ ...p, status: 'out' }));
    const allPlayers = [...qualifiedPlayers, ...eliminatedPlayers];

    setTournament(prev => ({
      ...prev,
      players: allPlayers,
      phase: 'bracketSeed',
    }));
    toast(`🏆 ${target} người vào bảng đấu chính!`, 'success');
  };

  // ---- Bracket Seeding ----
  const [seedingPairs, setSeedingPairs] = useState([]);
  const [seedingPlayers, setSeedingPlayers] = useState([]);
  const [spinningPair, setSpinningPair] = useState(false);

  useEffect(() => {
    if (tournament?.phase === 'bracketSeed') {
      const qualified = tournament.players.filter(p => p.status === 'active');
      setSeedingPlayers(shuffle(qualified));
      setSeedingPairs([]);
    }
  }, [tournament?.phase]);

  const spinNextPair = () => {
    if (seedingPlayers.length < 2 || spinningPair) return;
    setSpinningPair(true);
    setTimeout(() => {
      const remaining = [...seedingPlayers];
      const idx1 = Math.floor(Math.random() * remaining.length);
      const p1 = remaining.splice(idx1, 1)[0];
      const idx2 = Math.floor(Math.random() * remaining.length);
      const p2 = remaining.splice(idx2, 1)[0];
      setSeedingPairs(prev => [...prev, [p1, p2]]);
      setSeedingPlayers(remaining);
      setSpinningPair(false);
      toast(`🎰 Cặp đấu: ${p1.name} vs ${p2.name}`, 'success');
    }, 1500);
  };

  const confirmBracketSeed = () => {
    // Build the bracket from pairs + any byes
    const allQualified = tournament.players.filter(p => p.status === 'active');
    const target = tournament.bracketTarget;
    const pairs = [...seedingPairs];

    // If odd player left, they get a bye
    if (seedingPlayers.length === 1) {
      pairs.push([seedingPlayers[0], null]);
    }

    // Build winners bracket
    let matchCounter = [1];
    const makeMatch = (p1, p2, round, bracket, position) => ({
      matchId: `${bracket}_R${round}_P${position}`,
      p1: p1 || null,
      p2: p2 || null,
      p1Lane: null, p2Lane: null,
      p1Score: null, p2Score: null,
      winnerId: null, loserId: null,
      status: (p1 || p2) ? ((!p1 || !p2) ? 'bye' : 'pending') : 'pending',
      round, bracket, position,
      isBye: !!((p1 && !p2) || (!p1 && p2)),
    });

    // Round 1 of Winners bracket
    const wR1 = pairs.map((pair, i) => makeMatch(pair[0], pair[1], 1, 'W', i));

    // Auto-resolve byes
    const wR1Resolved = wR1.map(m => {
      if (m.isBye) {
        const winner = m.p1 || m.p2;
        return { ...m, winnerId: winner?.id, status: 'complete', p1Score: m.p1 ? 3 : null, p2Score: m.p2 ? 3 : null };
      }
      return { ...m, status: 'active' };
    });

    // Build subsequent rounds (placeholders)
    const totalWRounds = Math.log2(target);
    const allWRounds = [wR1Resolved];
    let prevCount = wR1Resolved.length;
    for (let r = 2; r <= totalWRounds; r++) {
      prevCount = Math.ceil(prevCount / 2);
      const round = Array.from({ length: prevCount }, (_, i) => makeMatch(null, null, r, 'W', i));
      allWRounds.push(round);
    }

    // Build losers bracket structure
    // Standard DE: LB gets n/2 losers from WR1, then plays them
    // For simplicity: build LB rounds as placeholders
    const totalLBRounds = (totalWRounds - 1) * 2;
    const allLRounds = [];
    let lbCount = target / 4;
    for (let r = 1; r <= totalLBRounds; r++) {
      const round = Array.from({ length: Math.max(1, lbCount) }, (_, i) => makeMatch(null, null, r, 'L', i));
      if (r % 2 === 0 && lbCount > 1) lbCount = Math.ceil(lbCount / 2);
      allLRounds.push(round);
    }

    // Populate LB Round 1 with losers from WB Round 1
    const wR1Losers = wR1Resolved
      .filter(m => m.loserId)
      .map(m => m.p1?.id === m.loserId ? m.p1 : m.p2)
      .filter(Boolean);

    // Place into LB R1
    const lbR1 = shuffle(wR1Losers);
    for (let i = 0; i < allLRounds[0]?.length && i * 2 < lbR1.length; i++) {
      allLRounds[0][i] = {
        ...allLRounds[0][i],
        p1: lbR1[i * 2] || null,
        p2: lbR1[i * 2 + 1] || null,
        status: (lbR1[i * 2] && lbR1[i * 2 + 1]) ? 'active' : 'pending',
      };
    }

    const grandFinal = makeMatch(null, null, 1, 'GF', 0);

    setTournament(prev => ({
      ...prev,
      phase: 'bracket',
      winnersRounds: allWRounds,
      losersRounds: allLRounds,
      grandFinal,
      matchHistory: {},
    }));
    toast('🏆 Bảng đấu đã được tạo!', 'success');
    setActiveTab('bracket');
  };

  // ---- Match completion ----
  const handleMatchComplete = (updatedMatch) => {
    setTournament(prev => {
      let newWR = prev.winnersRounds.map(r => r.map(m => m.matchId === updatedMatch.matchId ? updatedMatch : m));
      let newLR = prev.losersRounds.map(r => r.map(m => m.matchId === updatedMatch.matchId ? updatedMatch : m));
      let newGF = prev.grandFinal?.matchId === updatedMatch.matchId ? updatedMatch : prev.grandFinal;
      let newGFR = prev.grandFinalReset?.matchId === updatedMatch.matchId ? updatedMatch : prev.grandFinalReset;

      const winner = prev.players.find(p => p.id === updatedMatch.winnerId);
      const loser = prev.players.find(p => p.id === updatedMatch.loserId);

      // Update match history
      let newHistory = { ...prev.matchHistory };
      if (winner && loser) {
        newHistory[winner.id] = [...(newHistory[winner.id] || []), loser.id];
        newHistory[loser.id] = [...(newHistory[loser.id] || []), winner.id];
      }

      // Propagate winner through WB
      const wRoundIdx = newWR.findIndex(r => r.some(m => m.matchId === updatedMatch.matchId));
      if (wRoundIdx !== -1) {
        const matchIdx = newWR[wRoundIdx].findIndex(m => m.matchId === updatedMatch.matchId);
        // Advance winner to next WB round
        const nextRoundIdx = wRoundIdx + 1;
        if (nextRoundIdx < newWR.length && winner) {
          const nextMatchIdx = Math.floor(matchIdx / 2);
          const slot = matchIdx % 2 === 0 ? 'p1' : 'p2';
          newWR = newWR.map((r, ri) => ri !== nextRoundIdx ? r : r.map((m, mi) => {
            if (mi !== nextMatchIdx) return m;
            const updated = { ...m, [slot]: winner };
            if (updated.p1 && updated.p2) updated.status = 'active';
            return updated;
          }));
        } else if (nextRoundIdx >= newWR.length && winner) {
          // WB champion goes to Grand Final
          newGF = { ...newGF, p1: winner };
          if (newGF.p1 && newGF.p2) newGF.status = 'active';
        }

        // Drop loser to LB
        if (loser && newLR.length > 0) {
          // Find available spot in appropriate LB round
          const lbTargetRound = wRoundIdx * 2;
          const lbRoundIdx = Math.min(lbTargetRound, newLR.length - 1);
          let placed = false;
          newLR = newLR.map((r, ri) => {
            if (ri !== lbRoundIdx || placed) return r;
            return r.map(m => {
              if (placed) return m;
              if (!m.p1 || !m.p2) {
                placed = true;
                const slot = !m.p1 ? 'p1' : 'p2';
                const updated = { ...m, [slot]: loser };
                if (updated.p1 && updated.p2) updated.status = 'active';
                return updated;
              }
              return m;
            });
          });
        }
      }

      // Propagate winner through LB
      const lRoundIdx = newLR.findIndex(r => r.some(m => m.matchId === updatedMatch.matchId));
      if (lRoundIdx !== -1) {
        const matchIdx = newLR[lRoundIdx].findIndex(m => m.matchId === updatedMatch.matchId);

        // Loser in LB → OUT
        if (loser) {
          prev.players.find(p => p.id === loser.id) && (
            newWR = newWR // just note it
          );
          // Mark player as out
          const outPlayer = { ...loser, status: 'out' };
          // Update in players list handled below
        }

        // Advance LB winner
        const nextLBRound = lRoundIdx + 1;
        if (nextLBRound < newLR.length && winner) {
          const nextMatchIdx = Math.floor(matchIdx / 2);
          const slot = matchIdx % 2 === 0 ? 'p1' : 'p2';
          newLR = newLR.map((r, ri) => ri !== nextLBRound ? r : r.map((m, mi) => {
            if (mi !== nextMatchIdx) return m;
            const updated = { ...m, [slot]: winner };
            if (updated.p1 && updated.p2) updated.status = 'active';
            return updated;
          }));
        } else if (nextLBRound >= newLR.length && winner) {
          // LB champion goes to Grand Final
          newGF = { ...newGF, p2: winner };
          if (newGF.p1 && newGF.p2) newGF.status = 'active';
        }
      }

      // Grand Final
      const isGF = prev.grandFinal?.matchId === updatedMatch.matchId;
      const isGFR = prev.grandFinalReset?.matchId === updatedMatch.matchId;
      if (isGF && winner && loser) {
        // If WB player wins → champion
        // If LB player wins → grand final reset
        const wbChampion = newGF?.p1;
        if (winner.id === wbChampion?.id) {
          return { ...prev, winnersRounds: newWR, losersRounds: newLR, grandFinal: newGF,
            grandFinalReset: newGFR, matchHistory: newHistory, champion: winner,
            phase: 'complete' };
        } else {
          // Reset match
          const resetMatch = {
            matchId: 'GF_RESET',
            p1: wbChampion, p2: winner,
            p1Lane: null, p2Lane: null,
            p1Score: null, p2Score: null,
            winnerId: null, loserId: null,
            status: 'active', round: 2, bracket: 'GF', position: 0, isBye: false,
          };
          return { ...prev, winnersRounds: newWR, losersRounds: newLR, grandFinal: updatedMatch,
            grandFinalReset: resetMatch, matchHistory: newHistory };
        }
      }
      if (isGFR && winner) {
        return { ...prev, winnersRounds: newWR, losersRounds: newLR, grandFinal: newGF,
          grandFinalReset: updatedMatch, matchHistory: newHistory, champion: winner, phase: 'complete' };
      }

      // Update OUT status for loser in LB
      let updatedPlayers = prev.players.map(p => {
        if (p.id === updatedMatch.loserId && lRoundIdx !== -1) {
          return { ...p, status: 'out' };
        }
        return p;
      });

      return { ...prev, winnersRounds: newWR, losersRounds: newLR, grandFinal: newGF,
        grandFinalReset: newGFR, matchHistory: newHistory, players: updatedPlayers };
    });
  };

  // ---- Get current player ----
  const currentPlayer = tournament?.players.find(p => p.name === playerName);
  const isAdmin = role === 'admin';
  const existingNumbers = tournament?.players.filter(p => p.jackpotNumber).map(p => p.jackpotNumber) || [];

  // ============================================================
  // RENDER: LOGIN SCREEN
  // ============================================================
  if (!role) {
    return (
      <>
        <div className="login-screen">
          <div className="login-logo">
            🏎️ MINI 4WD<br/>TOURNAMENT
          </div>
          <div className="login-subtitle">TAMIYA RACING MANAGEMENT SYSTEM</div>

          <div className="login-card">
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 24 }}>
              {/* Guest */}
              <div style={{
                background: 'var(--bg3)', border: '1px solid var(--border)',
                borderRadius: 12, padding: 20, cursor: 'pointer',
                transition: 'all 0.2s',
              }}
                onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--cyan)'}
                onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--border)'}
              >
                <div style={{ textAlign: 'center', marginBottom: 12 }}>
                  <span style={{ fontSize: '2.5rem' }}>👤</span>
                  <div className="orbitron" style={{ fontSize: '1rem', fontWeight: 700, color: 'var(--cyan)', marginTop: 8 }}>GUEST</div>
                  <div className="text-dim text-xs" style={{ marginTop: 4 }}>Xem & xóc xúc xắc</div>
                </div>
                <input
                  className="input"
                  placeholder="Tên của bạn..."
                  value={playerName}
                  onChange={e => setPlayerName(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && loginGuest()}
                  style={{ marginBottom: 10, fontSize: '0.9rem' }}
                />
                <button className="btn btn-cyan w-full" onClick={loginGuest}>
                  VÀO XEM
                </button>
              </div>

              {/* Admin */}
              <div style={{
                background: 'var(--bg3)', border: '1px solid var(--border)',
                borderRadius: 12, padding: 20,
                transition: 'all 0.2s',
              }}
                onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--gold)'}
                onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--border)'}
              >
                <div style={{ textAlign: 'center', marginBottom: 12 }}>
                  <span style={{ fontSize: '2.5rem' }}>👑</span>
                  <div className="orbitron" style={{ fontSize: '1rem', fontWeight: 700, color: 'var(--gold)', marginTop: 8 }}>ADMIN</div>
                  <div className="text-dim text-xs" style={{ marginTop: 4 }}>Toàn quyền điều hành</div>
                </div>
                <div className={passError ? '' : ''} style={{ animation: passError ? 'shake 0.4s ease' : 'none' }}>
                  <input
                    className="input"
                    type="password"
                    placeholder="Mật khẩu..."
                    value={adminPass}
                    onChange={e => setAdminPass(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && loginAdmin()}
                    style={{ marginBottom: 10, fontSize: '0.9rem', borderColor: passError ? 'var(--red)' : undefined }}
                  />
                </div>
                <button className="btn btn-gold w-full" onClick={loginAdmin}>
                  ĐĂNG NHẬP
                </button>
              </div>
            </div>

            <div className="text-center text-dim text-xs" style={{ fontFamily: 'Share Tech Mono' }}>
              v2.0 · SGMS MINI 4WD CLUB
            </div>
          </div>
        </div>
        <ToastContainer toasts={toasts} />
      </>
    );
  }

  // ============================================================
  // RENDER: MAIN APP
  // ============================================================
  return (
    <>
      {/* HEADER */}
      <div className="app-header">
        <div className="header-logo">🏎️ M4WD</div>
        {tournament && (
          <div style={{ fontSize: '0.9rem', fontWeight: 600, color: 'var(--text)' }}>
            {tournament.name}
          </div>
        )}
        <div style={{ flex: 1 }} />
        <span className={`header-badge ${role}`}>
          {role === 'admin' ? '👑 ADMIN' : `👤 ${playerName}`}
        </span>
        <button className="btn btn-outline btn-sm" onClick={() => {
          setRole(null); setTournament(null); setShowNewTournament(false);
          setSeedingPairs([]); setSeedingPlayers([]);
          setFormName(''); setFormPlayers([]); setFormLocked(false);
        }}>
          Thoát
        </button>
      </div>

      <div className="app-container" style={{ padding: '16px 12px' }}>
        {/* NO TOURNAMENT */}
        {!tournament && !showNewTournament && (
          <div style={{ maxWidth: 480, margin: '60px auto', textAlign: 'center' }}>
            <div style={{ fontSize: '4rem', marginBottom: 16 }}>🏆</div>
            <div className="orbitron" style={{ fontSize: '1.4rem', color: 'var(--gold)', marginBottom: 8 }}>
              CHƯA CÓ GIẢI ĐẤU
            </div>
            <div className="text-dim" style={{ marginBottom: 32 }}>
              {isAdmin ? 'Tạo giải đấu mới để bắt đầu' : 'Chờ Admin tạo giải đấu'}
            </div>
            {isAdmin && (
              <button className="btn btn-gold btn-lg" onClick={() => setShowNewTournament(true)}>
                + TẠO GIẢI ĐẤU MỚI
              </button>
            )}
          </div>
        )}

        {/* NEW TOURNAMENT FORM */}
        {showNewTournament && !tournament && (
          <div style={{ maxWidth: 600, margin: '0 auto' }}>
            <div className="card mb-4">
              <div className="card-title">🏆 TẠO GIẢI ĐẤU MỚI</div>

              <div className="mb-3">
                <label className="text-xs text-dim mono" style={{ display: 'block', marginBottom: 6, letterSpacing: 2 }}>TÊN GIẢI ĐẤU</label>
                <input className="input" placeholder="VD: SGMS RACE SEASON 5..." value={formName}
                  onChange={e => setFormName(e.target.value)} disabled={formLocked} />
              </div>

              {/* Player count badge */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16 }}>
                <span className="text-dim text-sm">{formPlayers.length} người chơi</span>
                {formPlayers.length >= 8 && (
                  <span className="badge badge-gold">
                    {needsQualifier(formPlayers.length)
                      ? `Vòng loại → Top ${getBracketTarget(formPlayers.length)}`
                      : `DE ${getBracketTarget(formPlayers.length)} người`}
                  </span>
                )}
                {formPlayers.length < 8 && formPlayers.length > 0 && (
                  <span className="badge badge-red">Cần ít nhất 8</span>
                )}
              </div>

              {/* Add player */}
              {!formLocked && (
                <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
                  <input
                    className="input"
                    placeholder="Tên người chơi..."
                    value={newPlayerInput}
                    onChange={e => setNewPlayerInput(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && addPlayer()}
                    style={{ flex: 1 }}
                  />
                  <button className="btn btn-gold" onClick={addPlayer}>+ Thêm</button>
                </div>
              )}

              {/* Player list */}
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 16, maxHeight: 240, overflowY: 'auto' }}>
                {formPlayers.map((p, i) => (
                  <div key={p.id} className="player-row">
                    <span className="mono text-dim" style={{ minWidth: 24 }}>#{i + 1}</span>
                    <span style={{ flex: 1, fontWeight: 600 }}>{p.name}</span>
                    {!formLocked && (
                      <button className="btn btn-red btn-sm" onClick={() => removePlayer(p.id)}>✕</button>
                    )}
                  </div>
                ))}
                {formPlayers.length === 0 && (
                  <div className="text-center text-dim text-sm" style={{ padding: 20 }}>Chưa có người chơi</div>
                )}
              </div>

              {/* Qualifier rounds setting */}
              {formLocked && needsQualifier(formPlayers.length) && (
                <div style={{ background: 'var(--bg3)', borderRadius: 10, padding: 14, marginBottom: 16 }}>
                  <div className="text-sm font-bold mb-2">Số vòng loại:</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                    <button className="btn btn-outline btn-sm" onClick={() => setQualifierRounds(r => Math.max(1, r - 1))}>-</button>
                    <span className="orbitron text-gold" style={{ fontSize: '1.5rem', fontWeight: 900, minWidth: 40, textAlign: 'center' }}>
                      {qualifierRounds}
                    </span>
                    <button className="btn btn-outline btn-sm" onClick={() => setQualifierRounds(r => Math.min(10, r + 1))}>+</button>
                    <span className="text-dim text-sm">vòng</span>
                  </div>
                </div>
              )}

              <div style={{ display: 'flex', gap: 10 }}>
                <button className="btn btn-outline" onClick={() => setShowNewTournament(false)}>Hủy</button>
                {!formLocked ? (
                  <button className="btn btn-red" style={{ flex: 1 }} onClick={lockPlayers}
                    disabled={formPlayers.length < 8}>
                    🔒 KHÓA DANH SÁCH
                  </button>
                ) : (
                  <button className="btn btn-gold" style={{ flex: 1 }} onClick={createTournament}>
                    ✅ TẠO GIẢI ĐẤU
                  </button>
                )}
              </div>
            </div>
          </div>
        )}

        {/* TOURNAMENT ACTIVE */}
        {tournament && (
          <>
            <PhaseIndicator phase={tournament.phase} />

            {/* TABS */}
            <div className="tab-bar">
              <button className={`tab ${activeTab === 'players' ? 'active' : ''}`} onClick={() => setActiveTab('players')}>👥 Người Chơi</button>
              {(tournament.phase === 'qualifier') && (
                <button className={`tab ${activeTab === 'qualifier' ? 'active' : ''}`} onClick={() => setActiveTab('qualifier')}>⚔️ Vòng Loại</button>
              )}
              {(tournament.phase === 'bracketSeed') && (
                <button className={`tab ${activeTab === 'seed' ? 'active' : ''}`} onClick={() => setActiveTab('seed')}>🎰 Xếp Cặp</button>
              )}
              {(tournament.phase === 'bracket' || tournament.phase === 'complete') && (
                <button className={`tab ${activeTab === 'bracket' ? 'active' : ''}`} onClick={() => setActiveTab('bracket')}>🏆 Bảng Đấu</button>
              )}
              <button className={`tab ${activeTab === 'leaderboard' ? 'active' : ''}`} onClick={() => setActiveTab('leaderboard')}>📊 Bảng Điểm</button>
            </div>

            {/* ---- TAB: PLAYERS / JACKPOT ---- */}
            {activeTab === 'players' && (
              <div>
                <div className="card mb-4">
                  <div className="card-title">🎰 QUAY SỐ MAY MẮN</div>
                  <div className="text-dim text-sm mb-4">
                    Mỗi người chơi quay 1 lần để nhận số hiệu ngẫu nhiên. Số này sẽ theo suốt giải đấu.
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                    {tournament.players.map(p => (
                      <div key={p.id} style={{
                        background: 'var(--bg3)', borderRadius: 10, padding: '12px 16px',
                        border: p.jackpotNumber ? '1px solid var(--gold)30' : '1px solid var(--border)',
                        display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap'
                      }}>
                        <span style={{ fontWeight: 700, minWidth: 120 }}>{p.name}</span>
                        {p.jackpotNumber ? (
                          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                            <div className="jackpot-result" style={{ fontSize: '1.4rem' }}>{p.jackpotNumber}</div>
                            <span className="badge badge-gold">ĐÃ QUAY</span>
                          </div>
                        ) : (
                          (isAdmin || currentPlayer?.id === p.id) ? (
                            <JackpotReel
                              onResult={num => assignJackpotNumber(p.id, num)}
                              disabled={p.jackpotNumber !== null}
                              existingNumbers={existingNumbers}
                              label={isAdmin && currentPlayer?.id !== p.id ? `Quay cho ${p.name}` : 'Của bạn'}
                            />
                          ) : (
                            <span className="text-dim text-sm mono">🔒 Chờ quay...</span>
                          )
                        )}
                      </div>
                    ))}
                  </div>

                  {isAdmin && (
                    <div style={{ marginTop: 20 }}>
                      <div className="progress-bar mb-2">
                        <div className="progress-fill" style={{
                          width: `${(tournament.players.filter(p => p.jackpotNumber).length / tournament.players.length) * 100}%`
                        }} />
                      </div>
                      <div className="text-sm text-dim mb-3">
                        {tournament.players.filter(p => p.jackpotNumber).length} / {tournament.players.length} đã quay
                      </div>
                      <button className="btn btn-gold w-full btn-lg"
                        onClick={proceedFromJackpot}
                        disabled={!allJackpotsAssigned}>
                        {allJackpotsAssigned ? '✅ TIẾP TỤC →' : `Chờ ${tournament.players.filter(p => !p.jackpotNumber).length} người quay số...`}
                      </button>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* ---- TAB: QUALIFIER ---- */}
            {activeTab === 'qualifier' && tournament.phase === 'qualifier' && (
              <div>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                  <div className="orbitron text-gold" style={{ fontSize: '1rem' }}>
                    VÒNG LOẠI {tournament.currentQualifierRound} / {tournament.qualifierRounds}
                  </div>
                  <div className="badge badge-gold">{tournament.bracketTarget} suất vào bảng chính</div>
                </div>

                {tournament.qualifierData.map((roundData, roundIdx) => (
                  <div key={roundIdx} className="card mb-4">
                    <div className="card-title">⚔️ VÒNG LOẠI {roundData.round}</div>
                    {roundData.groups.map((group, groupIdx) => {
                      const allDiceRolled = group.players.every(p => group.lanes[p.id] !== undefined);
                      const allScored = group.players.every(p => group.scores[p.id] !== undefined);

                      return (
                        <div key={groupIdx} style={{
                          background: 'var(--bg3)', borderRadius: 10, padding: 14,
                          marginBottom: 12, border: group.complete ? '1px solid var(--green)30' : '1px solid var(--border)'
                        }}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
                            <span className="mono text-dim text-xs">VÁN {groupIdx + 1}</span>
                            {group.complete && <span className="badge badge-green">XONG</span>}
                          </div>

                          {group.players.map(p => {
                            const canDice = (isAdmin || currentPlayer?.id === p.id) && !group.lanes[p.id] && !group.complete;
                            const diceLocked = !!group.lanes[p.id];
                            const allowedVals = group.players.length === 2 ? [1, 3] : [1, 2, 3];

                            return (
                              <div key={p.id} style={{
                                display: 'flex', alignItems: 'center', gap: 12,
                                padding: '10px 0', borderBottom: '1px solid var(--border)'
                              }}>
                                <span className="badge badge-gold">{p.jackpotNumber}</span>
                                <span style={{ fontWeight: 600, flex: 1, minWidth: 80 }}>{p.name}</span>

                                <DiceRoller
                                  allowedValues={allowedVals}
                                  onResult={v => handleQualifierDice(roundIdx, groupIdx, p.id, v)}
                                  disabled={!canDice || group.complete}
                                  locked={diceLocked}
                                  lockedValue={group.lanes[p.id]}
                                />

                                {isAdmin && !group.complete && (
                                  <div style={{ display: 'flex', gap: 4 }}>
                                    {[0,1,2,3].map(s => (
                                      <button key={s}
                                        className={`score-btn ${group.scores[p.id] === s ? 'selected' : ''}`}
                                        style={{ width: 36, height: 36, fontSize: '0.85rem' }}
                                        onClick={() => handleQualifierScore(roundIdx, groupIdx, p.id, s)}>
                                        {s}
                                      </button>
                                    ))}
                                  </div>
                                )}
                                {(group.complete || !isAdmin) && group.scores[p.id] !== undefined && (
                                  <span className="orbitron text-gold" style={{ fontWeight: 900, fontSize: '1.1rem', minWidth: 32, textAlign: 'right' }}>
                                    {group.scores[p.id]}
                                  </span>
                                )}
                              </div>
                            );
                          })}

                          {isAdmin && !group.complete && (
                            <button
                              className="btn btn-gold btn-sm"
                              style={{ marginTop: 12 }}
                              onClick={() => completeQualifierGroup(roundIdx, groupIdx)}
                              disabled={!allDiceRolled || !allScored}
                            >
                              ✅ Xác nhận ván này
                            </button>
                          )}
                        </div>
                      );
                    })}

                    {/* Advance round button */}
                    {isAdmin && isQualifierRoundComplete(roundIdx) && roundIdx === tournament.currentQualifierRound - 1 && (
                      <div style={{ marginTop: 16 }}>
                        {tournament.currentQualifierRound < tournament.qualifierRounds ? (
                          <button className="btn btn-gold w-full" onClick={advanceQualifierRound}>
                            ▶ VÒNG LOẠI {tournament.currentQualifierRound + 1} →
                          </button>
                        ) : (
                          <button className="btn btn-red w-full btn-lg" onClick={finalizeQualifiers}>
                            🏆 TỔNG KẾT VÒNG LOẠI
                          </button>
                        )}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}

            {/* ---- TAB: BRACKET SEEDING ---- */}
            {activeTab === 'seed' && tournament.phase === 'bracketSeed' && (
              <div style={{ maxWidth: 640, margin: '0 auto' }}>
                <div className="card">
                  <div className="card-title">🎰 XẾP CẶP ĐẤU (JACKPOT)</div>
                  <div className="text-dim text-sm mb-4">
                    Admin quay 2 số để tìm cặp đấu. Visible với tất cả người xem.
                  </div>

                  {/* Remaining players */}
                  {seedingPlayers.length > 0 && (
                    <div style={{ marginBottom: 20 }}>
                      <div className="text-xs text-dim mono mb-2">CÒN LẠI ({seedingPlayers.length}):</div>
                      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                        {seedingPlayers.map(p => (
                          <span key={p.id} className="badge badge-dim">
                            <span style={{ color: 'var(--gold)' }}>{p.jackpotNumber}</span> {p.name}
                          </span>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Spin button */}
                  {isAdmin && seedingPlayers.length >= 2 && (
                    <div style={{ textAlign: 'center', marginBottom: 20 }}>
                      <button
                        className="btn btn-gold btn-xl"
                        onClick={spinNextPair}
                        disabled={spinningPair}
                        style={{ animation: spinningPair ? 'glow-pulse 0.5s infinite' : 'none' }}
                      >
                        {spinningPair ? '🎰 Đang quay...' : '🎰 QUAY CẶP TIẾP THEO'}
                      </button>
                    </div>
                  )}

                  {/* Pairs drawn */}
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                    {seedingPairs.map(([p1, p2], i) => (
                      <div key={i} style={{
                        background: 'var(--bg3)', borderRadius: 10, padding: '10px 14px',
                        border: '1px solid var(--gold)30',
                        display: 'flex', alignItems: 'center', gap: 10,
                        animation: 'slide-in-up 0.3s ease'
                      }}>
                        <span className="orbitron text-dim" style={{ fontSize: '0.75rem', minWidth: 20 }}>#{i + 1}</span>
                        <span className="badge badge-gold">{p1.jackpotNumber}</span>
                        <span style={{ fontWeight: 700 }}>{p1.name}</span>
                        <span className="text-dim orbitron" style={{ fontSize: '0.75rem', margin: '0 8px' }}>VS</span>
                        {p2 ? (
                          <>
                            <span className="badge badge-gold">{p2.jackpotNumber}</span>
                            <span style={{ fontWeight: 700 }}>{p2.name}</span>
                          </>
                        ) : (
                          <span className="badge badge-cyan">BYE</span>
                        )}
                      </div>
                    ))}
                  </div>

                  {/* Bye remaining */}
                  {seedingPlayers.length === 1 && (
                    <div style={{ marginTop: 10 }}>
                      <div className="text-dim text-sm mb-2">Còn 1 người, sẽ nhận BYE:</div>
                      <span className="badge badge-cyan">{seedingPlayers[0].name} → BYE</span>
                    </div>
                  )}

                  {/* Confirm */}
                  {isAdmin && seedingPlayers.length <= 1 && seedingPairs.length > 0 && (
                    <button className="btn btn-gold w-full btn-lg" style={{ marginTop: 20 }} onClick={confirmBracketSeed}>
                      ✅ XÁC NHẬN & TẠO BẢNG ĐẤU
                    </button>
                  )}
                </div>
              </div>
            )}

            {/* ---- TAB: BRACKET ---- */}
            {activeTab === 'bracket' && (tournament.phase === 'bracket' || tournament.phase === 'complete') && (
              <div>
                {tournament.phase === 'complete' && tournament.champion && (
                  <div style={{
                    background: 'linear-gradient(135deg, var(--gold)20, var(--gold)05)',
                    border: '2px solid var(--gold)',
                    borderRadius: 16, padding: 24, textAlign: 'center', marginBottom: 20,
                    animation: 'winner-flash 2s ease-in-out infinite',
                    boxShadow: '0 0 40px var(--gold)30'
                  }}>
                    <div style={{ fontSize: '3rem', marginBottom: 8 }}>🏆</div>
                    <div className="orbitron text-gold" style={{ fontSize: '1.5rem', fontWeight: 900 }}>
                      VÔ ĐỊCH
                    </div>
                    <div style={{ fontSize: '1.8rem', fontWeight: 700, marginTop: 8 }}>
                      {tournament.champion.name}
                    </div>
                    <div className="mono text-gold" style={{ fontSize: '1.2rem', marginTop: 4 }}>
                      #{tournament.champion.jackpotNumber}
                    </div>
                  </div>
                )}

                {/* WINNERS BRACKET */}
                <div className="card mb-4">
                  <div className="bracket-section-title" style={{ color: 'var(--gold)' }}>
                    🏆 NHÁNH THẮNG (WINNERS BRACKET)
                  </div>
                  <div className="bracket-container">
                    <div style={{ display: 'flex', gap: 16, minWidth: 'max-content' }}>
                      {tournament.winnersRounds.map((round, ri) => (
                        <div key={ri} style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                          <div className="bracket-round-label">
                            {ri === tournament.winnersRounds.length - 1 ? 'CHUNG KẾT NHÁNH' : `VÒNG W${ri + 1}`}
                          </div>
                          <div style={{
                            display: 'flex', flexDirection: 'column',
                            gap: Math.pow(2, ri) * 8,
                            marginTop: Math.pow(2, ri - 1) * 4
                          }}>
                            {round.map((match, mi) => (
                              <div key={mi} onClick={() => {
                                if (match.status === 'active' || (match.status === 'complete' && isAdmin)) {
                                  setSelectedMatch(match);
                                }
                              }} style={{ cursor: match.status === 'active' ? 'pointer' : 'default' }}>
                                <BracketMatchBox
                                  match={match}
                                  players={tournament.players}
                                  isAdmin={isAdmin}
                                  currentPlayerId={currentPlayer?.id}
                                />
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* LOSERS BRACKET */}
                {tournament.losersRounds.length > 0 && (
                  <div className="card mb-4">
                    <div className="bracket-section-title" style={{ color: 'var(--red)' }}>
                      💀 NHÁNH THUA (LOSERS BRACKET)
                    </div>
                    <div className="bracket-container">
                      <div style={{ display: 'flex', gap: 16, minWidth: 'max-content' }}>
                        {tournament.losersRounds.map((round, ri) => (
                          <div key={ri} style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                            <div className="bracket-round-label" style={{ color: 'var(--red)' }}>VÒNG L{ri + 1}</div>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                              {round.map((match, mi) => (
                                <div key={mi} onClick={() => {
                                  if (match.status === 'active' || (isAdmin && match.status === 'complete')) {
                                    setSelectedMatch(match);
                                  }
                                }} style={{ cursor: match.status === 'active' ? 'pointer' : 'default' }}>
                                  <BracketMatchBox
                                    match={match}
                                    players={tournament.players}
                                    isAdmin={isAdmin}
                                    currentPlayerId={currentPlayer?.id}
                                  />
                                </div>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {/* GRAND FINAL */}
                {tournament.grandFinal && (
                  <div className="card">
                    <div className="bracket-section-title" style={{ color: 'var(--gold)', fontSize: '1rem' }}>
                      👑 GRAND FINAL
                    </div>
                    <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', alignItems: 'flex-start' }}>
                      <div onClick={() => {
                        if (tournament.grandFinal.status === 'active') setSelectedMatch(tournament.grandFinal);
                      }} style={{ cursor: tournament.grandFinal.status === 'active' ? 'pointer' : 'default' }}>
                        <div className="text-xs text-dim mono mb-2" style={{ letterSpacing: 2 }}>TRẬN CHÍNH</div>
                        <BracketMatchBox
                          match={tournament.grandFinal}
                          players={tournament.players}
                          isAdmin={isAdmin}
                          currentPlayerId={currentPlayer?.id}
                        />
                      </div>
                      {tournament.grandFinalReset && (
                        <div onClick={() => {
                          if (tournament.grandFinalReset.status === 'active') setSelectedMatch(tournament.grandFinalReset);
                        }} style={{ cursor: tournament.grandFinalReset.status === 'active' ? 'pointer' : 'default' }}>
                          <div className="text-xs text-dim mono mb-2" style={{ letterSpacing: 2, color: 'var(--red)' }}>
                            VÁN LẠI (RESET)
                          </div>
                          <BracketMatchBox
                            match={tournament.grandFinalReset}
                            players={tournament.players}
                            isAdmin={isAdmin}
                            currentPlayerId={currentPlayer?.id}
                          />
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ---- TAB: LEADERBOARD ---- */}
            {activeTab === 'leaderboard' && (
              <div style={{ maxWidth: 600, margin: '0 auto' }}>
                <div className="card">
                  <div className="card-title">📊 BẢNG ĐIỂM</div>
                  {tournament.hasQualifier && (
                    <>
                      <div className="text-xs text-dim mono mb-3" style={{ letterSpacing: 2 }}>ĐIỂM VÒNG LOẠI</div>
                      {[...tournament.players]
                        .sort((a, b) => (b.qualifierScore || 0) - (a.qualifierScore || 0))
                        .map((p, i) => {
                          const qualifies = i < tournament.bracketTarget;
                          return (
                            <div key={p.id} className={`lb-row ${qualifies ? 'qualify' : 'eliminate'}`}>
                              <span className="lb-rank">#{i + 1}</span>
                              <span className="badge badge-gold" style={{ fontSize: '0.7rem' }}>{p.jackpotNumber || '??'}</span>
                              <span style={{ flex: 1, fontWeight: 600 }}>{p.name}</span>
                              {p.status === 'out' && <span className="out-stamp">OUT</span>}
                              {qualifies && p.status !== 'out' && <span className="badge badge-green">PASS</span>}
                              <span className="lb-score text-gold">{p.qualifierScore || 0}</span>
                            </div>
                          );
                        })}
                      <div className="divider" />
                    </>
                  )}
                  <div className="text-xs text-dim mono mb-3" style={{ letterSpacing: 2 }}>TRẠNG THÁI</div>
                  {tournament.players.map(p => (
                    <div key={p.id} className={`lb-row ${p.status === 'out' ? 'eliminate' : 'qualify'}`}>
                      <span className="badge badge-gold" style={{ fontSize: '0.7rem' }}>{p.jackpotNumber || '??'}</span>
                      <span style={{ flex: 1, fontWeight: 600 }}>{p.name}</span>
                      {p.status === 'out'
                        ? <span className="out-stamp">OUT</span>
                        : <span className="badge badge-green">ACTIVE</span>
                      }
                      {tournament.champion?.id === p.id && <span style={{ fontSize: '1.2rem' }}>🏆</span>}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </>
        )}
      </div>

      {/* MATCH DETAIL MODAL */}
      {selectedMatch && (
        <MatchDetailModal
          match={selectedMatch}
          players={tournament?.players || []}
          isAdmin={isAdmin}
          onClose={() => setSelectedMatch(null)}
          onComplete={handleMatchComplete}
          currentPlayerId={currentPlayer?.id}
          toastFn={toast}
        />
      )}

      <ToastContainer toasts={toasts} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
